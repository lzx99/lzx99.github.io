            <a href="/2020/10/28/0.%20Git/" class="post-title-link" itemprop="url">未命名</a>
        </h2>

        <div class="post-meta-container">
          <div class="post-meta">

    </span>
      <span class="post-meta-item">
        <span class="post-meta-item-icon">
          <i class="far fa-calendar-check"></i>
        </span>
        <span class="post-meta-item-text">更新于</span>

    <div class="post-body" itemprop="articleBody">
          <h4 id="Git还原"><a href="#Git还原" class="headerlink" title="Git还原"></a>Git还原</h4><p>场景1：从暂存区还原：<code>git checkout -- a.txt</code></p>
<p>场景2：<code>git reset HEAD &lt;file&gt;</code>（将最新分支恢复到暂存区）</p>
<p>场景3：历史版本直接回退到工作区和暂存区</p>
<p><code>git reset --hard commit_id</code> 回退版本，HEAD指向的版本为当前版本，所以用<code>HEAD^</code></p>
<h4 id="Git删除"><a href="#Git删除" class="headerlink" title="Git删除"></a>Git删除</h4><p>需要用命令<code>git rm</code>用于删除一个文件，操作保存在暂存区，<code>git commit -m</code>提交版本</p>
<h4 id="clone"><a href="#clone" class="headerlink" title="clone"></a>clone</h4><p>不指定分支clone时，默认下载远程项目（master分支）， 会关联并追踪所有分支，默认名为origin</p>
<p>分支：可以<code>git checkout -b dev origin/dev</code>在本地创建。</p>
<h4 id="remote"><a href="#remote" class="headerlink" title="remote"></a>remote</h4><figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">git remote add origin [git@github.com](&lt;mailto:git@github.com&gt;):zhu-xin&#x2F;demo.git</span><br></pre></td></tr></table></figure>

<p>创建本地库后，本地库与自己的远程库<strong>关联并设定主机名</strong>（默认远程库为origin），一般用于本地库上传到GitHub的空库（remote以后push一个master分支）</p>
<ul>
<li>查看本地关联的远程库信 息：<code>git remote -v</code></li>
</ul>
<h4 id="Push"><a href="#Push" class="headerlink" title="Push"></a>Push</h4><p>推送本地分支到远程，<code>没有则创建</code>，如果分支在远程分支的后面，解决冲突才能推送，-f参数强制覆盖远程的，一般用不到，一般只需要同步master分支和dev分支，feature分支取决于你是否需要修复，bug分支般只由你一个人修复，不需要同步。</p>
<ul>
<li><p>推送本地master分支到远程master分支：git push origin 本地master:远程master（gp）</p>
<p>省略:远程分支名时，代表推送到远程同名：<code>git push origin master</code></p>
<p>推送同时，将远程master和本地关联：git push -u origin master（第一次）</p>
</li>
<li><p>将当前推送到有origin上他的追踪关系的分支，可以省略分支名字：<code>git push origin</code></p>
</li>
<li><p>当只有一个主机的追踪分支时可以省略主机名：git push</p>
</li>
<li><p>推送所有分支到远程：git push –all origin</p>
</li>
<li><p>删除远程分支：<code>git push origin --delete dev</code>或者<code>git push origin :dev</code></p>
</li>
</ul>
<h4 id="Pull-Fetch-Merge"><a href="#Pull-Fetch-Merge" class="headerlink" title="Pull = Fetch+Merge"></a>Pull = Fetch+Merge</h4><p>取回并合并：git pull origin 远程master:本地master，本地没有则会创建，也可以使用</p>
<p>省略:本地分支时，代表取回并合并到本地当前所在分支：<code>git pull origin master</code></p>
<p>当前分支与origin上他的追踪分支取回并合并：<code>git pull origin</code></p>
<p>当前分支与唯一主机上的追踪分支取回并合并：git pull</p>
<p>设置本地dev和远程dev分支关联：<code>git branch --set-upstream-to=origin/dev dev</code>（或者第一次push的时候加如-u）</p>
<h4 id="Fetch"><a href="#Fetch" class="headerlink" title="Fetch"></a>Fetch</h4><p>用于抓取远程分支到本地，成为origin/master分支，不会合并到本地master</p>
<p>所以remote后，需要用<code>git fetch origin</code>取回所有分支信息，才能查看远程分支信息：<code>git branch -r</code></p>
<h4 id="分支查看："><a href="#分支查看：" class="headerlink" title="分支查看："></a>分支查看：</h4><ul>
<li>查看本地分支：<code>git branch</code>(gb)，当前分支会显示<code>*</code></li>
<li>查看远程分支：<code>git branch -r</code>(gbr)</li>
<li>查看本地分支和远程git的分支：<code>git branch -a</code>(gba)</li>
<li>创建分支：<code>git branch dev</code></li>
<li>创建并切换分支：<code>git checkout -b dev</code></li>
<li>普通删除：<code>git branch -d &lt;name&gt;</code>（gbd）</li>
<li>删除没有被合并过的分支，<code>git branch -D &lt;name&gt;</code>（gbD）</li>
<li>本地-远程的追踪分支关系：<code>git branch -vv</code></li>
</ul>
<p>切换分支时：<code>git checkout/switch dev</code>(gco dev)，切换就是HEAD指针的变化。</p>
<ul>
<li><strong>快速合并</strong>dev分支到当前分支：<code>git merge dev</code>(gm)，快速合并有时会产生冲突，比如当dev提交后，master又有新的提交。此时修改冲突文件，再次add+commit，此时冲突解决，两个分支合成新的分支。</li>
<li>禁用快速合并在（普通模式）：<code>git merge —-no-ff lee -m &quot;Do Job&quot;</code>，能看出来谁曾经做过合并。</li>
</ul>

    <div class="post-body" itemprop="articleBody">
          <h2 id="HTTP协议"><a href="#HTTP协议" class="headerlink" title="HTTP协议"></a>HTTP协议</h2><p>在<strong>TCP/IP四层网络结构（应用层，传输层TCP/UDP，网络层IP，网络接口层）</strong>中。OSI七层</p>
<p>发送端在层与层间传输数据时，每经过一层都会被加上网络层的首部信息，接收端每经过一层都会删除一条当前网络层的首部信息。</p>
<p>HTTP1/2是<strong>基于TCP/IP</strong>应用层的协议（<a target="_blank" rel="noopener" href="https://zhuanlan.zhihu.com/p/68012355">HTTP3基于UDP</a>），最初只用来传输HTML且只有GET方法，97年的1.1版本用了将近20年，2015年诞生了HTTP 2。</p>
<ul>
<li><p><strong>无连接</strong>；<strong>即请求时连接，请求完释放连接</strong>，服务器收到请求，返回响应，服务器收到应答，断开连接。</p>
<p>无连接设计之初目的是为了不占用网络资源，如果一个网页有包含许多请求（如很多图片），多次连接降低了网络效率，所以在HTTP 1.1时，产生了<strong>Connection: Keep-Alive</strong>，默认开启，使客户端和服务器在keep-alive规定时间内保持连接TCP连接，只有设置Connecttion：false时取消</p>
</li>
<li><p><strong>无状态</strong>：<strong>每个HTTP报文是独立的</strong>，服务器对于前面请求处理的信息，后面请求不能直接获取到前面请求中的信息。</p>
<p>设计之初降低了服务器的压力，但是在动态Web时代，无状态特性阻碍了应用程序的实现。于是产生了记录状态的<strong>Cookie和Session</strong>。</p>
<p><strong>Cookie</strong>：会话保存在客户端，Cookie只能保存是字符串（4KB），切勿保存重要数据，<strong>默认浏览器关闭时清除session</strong>，除非服务端设置setMaxAge。一个cookie就是一个（String，String），使用request.getCookies()获得一个cookie数组，getName()获得cookie的name，getValue获得cookie的value</p>
<p><strong>Session</strong>：会话保存在服务器，在调用getSession时创建，判断cookie中有无sessionid，无就生成sessionID，定义一个会话状态，并将sessionid通过Cookie发送给浏览器。</p>
<p>restful的前后端分离项目中一般会使用 access_token，因为前后端分离项目跨域，使用cookie里的sessionID不方便认证状态，这个token和session_id是一个意思。<a target="_blank" rel="noopener" href="https://juejin.im/entry/5bd921fce51d45686d40b2d6">分离Cookie参考</a></p>
<p><a target="_blank" rel="noopener" href="https://blog.csdn.net/hxfghgh/article/details/82840613">关于Cookie</a></p>
</li>
</ul>
<p><a target="_blank" rel="noopener" href="https://zhuanlan.zhihu.com/p/24860273">TCP和UDP</a></p>
<h2 id="HTTP报文解析"><a href="#HTTP报文解析" class="headerlink" title="HTTP报文解析"></a>HTTP报文解析</h2><p><strong>Start line 起始行 — Header Filed 头部字段 — 空行 — Entity Body 实体主体</strong></p>
<p>起始行和头部字段构成HTTP报文头部（Headers）</p>
<h4 id="1-HTTP-请求报文"><a href="#1-HTTP-请求报文" class="headerlink" title="1. HTTP 请求报文"></a>1. HTTP 请求报文</h4><p><strong>请求行–HTTP头字段–空行–请求体</strong></p>
<p>浏览器只支持POST和GET这两种请求方法，实际上还有HEAD，TRACE，PATCH，PUSH等请求方法。一般纯查询请求可以使用GET，其他请求用POST。由于只能是ASCII编码，所以GET不能传输中文</p>
<ol>
<li>**GET请求：放在请求行(URL)**，会暴露在地址栏，有长度限制，会被主动Cache，只有默认编    码。</li>
<li><strong>POST请求：放在报文体</strong>，无长度限制，可以传输中文。POST请求也可以在请求行中写入数据，这时候类似GET请求，但一般没人会在form action或ajax url中加入这种处理</li>
</ol>
<figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">POST</span> <span class="string">/mix/76.html?name=kelvin&amp;password=123456</span> HTTP/1.1</span><br><span class="line"><span class="attribute">Host</span>: www.fishbay.cn</span><br><span class="line"><span class="attribute">Upgrade-Insecure-Requests</span>: 1</span><br><span class="line"><span class="attribute">User-Agent</span>: Mozilla/5.0 (Macintosh; Intel Mac OS X 10_11_5) </span><br><span class="line"><span class="attribute">Conetent-Type</span>: application/x-www-form-urlencoded</span><br><span class="line"><span class="attribute">Cookie</span>: JASSDHUHFUBSIUFHI=232DWUFHI</span><br><span class="line"><span class="attribute">Accept-Encoding</span>: gzip, deflate, sdch</span><br><span class="line"><span class="attribute">Accept-Language</span>: zh-CN,zh;q=0.8,en;q=0.6</span><br><span class="line"></span><br><span class="line">username=jinqiao&amp;password=1234</span><br></pre></td></tr></table></figure>

<h4 id="2-HTTP-响应报文"><a href="#2-HTTP-响应报文" class="headerlink" title="2. HTTP 响应报文"></a>2. HTTP 响应报文</h4><p><strong>状态行–HTTP头–空行–响应体</strong></p>
<p>这个http响应的响应正文时纯文本，可以时html等等</p>
<p>Etag，Vary: User-Agent，Cache-Control等都是常用的响应头设置</p>
<figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">HTTP/1.1 <span class="number">200</span> OK</span><br><span class="line"><span class="attribute">Server</span>: nginx</span><br><span class="line"><span class="attribute">Date</span>: Mon, 20 Feb 2017 09:13:59 GMT</span><br><span class="line"><span class="attribute">Content-Type</span>: text/plain;charset=UTF-8</span><br><span class="line"><span class="attribute">Vary</span>: Accept-Encoding</span><br><span class="line"><span class="attribute">Cache-Control</span>: no-store</span><br><span class="line"><span class="attribute">Pragrma</span>: no-cache</span><br><span class="line"><span class="attribute">Expires</span>: Thu, 01 Jan 1970 00:00:00 GMT</span><br><span class="line"><span class="attribute">Cache-Control</span>: no-cache</span><br><span class="line"><span class="attribute">Content-Encoding</span>: gzip</span><br><span class="line"><span class="attribute">Transfer-Encoding</span>: chunked</span><br><span class="line"><span class="attribute">Proxy-Connection</span>: Keep-alive</span><br><span class="line"></span><br><span class="line">&#123;&quot;code&quot;:200,&quot;notice&quot;:0,&quot;follow&quot;:0,&quot;forward&quot;:0,&quot;msg&quot;:0,&quot;comment&quot;:0&#125;</span><br></pre></td></tr></table></figure>

<h4 id="3-HTTP-Header"><a href="#3-HTTP-Header" class="headerlink" title="3. HTTP Header"></a>3. HTTP Header</h4><p>HTTP Header中有四种Header Filed：</p>
<p><strong>通用头：</strong>请求头和响应头都可使用字段</p>
<p><strong>Cache-Control</strong>、Pragma、Date、Via</p>
<p>Connection：keep-alive/close</p>
<p><strong>实体头：</strong>用于定义Entity Body（数据）的一些信息的头字段</p>
<p>Location（重定向跳转就设置了这个）、</p>
<p><strong>Content-Type</strong>、Conetent-Encoding（响应内容的压缩）、</p>
<p>Expire、Allow、Etag（资源标识符）、Last-Modify</p>
<p><strong>请求头：</strong></p>
<p>User-Agent、Host、Referer、<strong>Accept</strong>（希望接收的类型）</p>
<p><strong>响应头：</strong></p>
<p>Age（在代理服务器中缓存秒数）、Server（提供服务器信息）、Vary</p>
<h2 id="HTTP缓存"><a href="#HTTP缓存" class="headerlink" title="HTTP缓存"></a>HTTP缓存</h2><p>HTTP缓存也称为Web缓存，主要就是客户端本身的<strong>浏览器本地缓存</strong>和代理服务器缓存（正向代理和反向代理）。<strong>只能缓存GET请求</strong>的内容，缓存css、js、HTML等静态资源</p>
<p><a target="_blank" rel="noopener" href="https://juejin.im/post/5c417993f265da61285a6075">缓存Cache-Control参考</a></p>
<p>在HTTP1.0时代，pragma和Expires两个头字段可以设置缓存策略。</p>
<p>到了HTTP1.1以后，又有<strong>Cache-Control</strong>设置缓存策略，HTML meta、动态网页中可以设置。</p>
<p>​    public：允许客户端和代理服务器缓存</p>
<p>​    private（GET请求默认）：允许客户端缓存</p>
<p>​    <strong>no-cache</strong>：允许客户端缓存，但每次快取需要由服务器请求缓存是否过期，未过期返回304。协商缓存</p>
<p>​    <strong>no-store：不允许缓存。</strong></p>
<p>​    <strong>max-age=60</strong>：允许缓存保留60秒（自带no-cache），没有这个属性就会去查找expire。强缓存</p>
<p>​    must-revalidate</p>
<p>这些设置缓存的头字段时通用头字段，当request和response都设置时，Apache或nginx等服务器可以设置听哪个request还是response的。</p>
<p><a target="_blank" rel="noopener" href="https://blog.skk.moe/post/what-happend-to-dns-in-proxy/">浅谈在代理环境中的 DNS 解析行为</a></p>

          <h2 id="tomcat的结构"><a href="#tomcat的结构" class="headerlink" title="tomcat的结构"></a>tomcat的结构</h2><p><img src="https://www.ibm.com/developerworks/cn/java/j-lo-tomcat1/image001.gif" alt="图 1.Tomcat 的总体结构"></p>
<p>tomcat里有<strong>一个server</strong>，在Tomcat的server.xml中配置server标签的信息来配置server。</p>
<p>server有<strong>一个至多个service</strong>（默认一个），service的核心组件是connector和container</p>
<ul>
<li><p><strong>connector</strong>：解析请求，并封装request和response两个对象。（底层创建socket接收请求）</p>
<p>默认service自带两个connector，一个解析HTTP请求，一个解析AJP请求，与Apache服务器集成时，会采用AJP解析。</p>
<p>tomcat不设置编码时，默认编码是iso8859-1，即tomcat默认以iso8859-1编码接收get参数。在connector中可以设置tomcat服务器的编码，这样请求</p>
</li>
<li><p><strong>container</strong>：servlet容器，有四种父子关系的container。connector过来的request根据容器pipiline-valve模式下到达请求service方法。</p>
<p><strong>—engine</strong></p>
<p><strong>—host</strong>：存放所有web项目的文件夹，appBase属性指定哪个文件夹为host容器，默认webapps：</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">Context</span> <span class="attr">path</span>=<span class="string">&quot;&quot;</span> <span class="attr">docBase</span>=<span class="string">&quot;webapps/web&quot;</span> <span class="attr">reloadable</span>=<span class="string">&quot;true&quot;</span>/&gt;</span> </span><br></pre></td></tr></table></figure>

<p><strong>—contex</strong>t：一个web应用，初始化后就会初始化</p>
<p><strong>—wrapper</strong>：对应一个servlet类，开启FilterChain对request和response对象过滤处理</p>
</li>
</ul>
<h4 id="tomcat的请求过程"><a href="#tomcat的请求过程" class="headerlink" title="tomcat的请求过程"></a>tomcat的请求过程</h4><ul>
<li><p>服务器启动后会依次初始化各容器，Context容器会读取项目中web.xml的映射来初始化wrapper。servlet的wrapper会封装一个InvokerServlet，jsp会封装JspServlet，静态资源封装一个DefaultServlet对象</p>
</li>
<li><p>收到请求后，connector根据请求信息创建request和response对象</p>
</li>
</ul>
<ul>
<li><p>请求在container层层根据请求的信息定位到wrapper，并通过里面的Filter</p>
</li>
<li><p>访问到service方法 / 取到静态页面</p>
<p>当service方法中有输出流时，则会用response封装返回，connector发送到客户端</p>
</li>
</ul>
<h2 id="Servlet"><a href="#Servlet" class="headerlink" title="Servlet"></a>Servlet</h2><p>创建类并继承HttpServlet类我们就创建了一个Servlet。</p>
<p>映射原则：多个URL可以映射到一个Servlet上，但一个URL只能映射一个servlet，映射路径必须是绝对路径</p>
<ul>
<li><p>@WebServlet ( name=”testServlet”,vaule=”/test” loadonstart=1 , </p>
<p>​                         initparam=@WebInitParam(name=”name”, value=”小明”) )</p>
</li>
<li><p>web.xml</p>
</li>
</ul>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">context-param</span>&gt;</span></span><br><span class="line">	<span class="tag">&lt;<span class="name">param-name</span>&gt;</span>name<span class="tag">&lt;/<span class="name">param-name</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">param-value</span>&gt;</span>jackson<span class="tag">&lt;/<span class="name">param-value</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">context-param</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">servlet</span>&gt;</span></span><br><span class="line">  	<span class="tag">&lt;<span class="name">servlet-name</span>&gt;</span>TestServlet<span class="tag">&lt;/<span class="name">servlet-name</span>&gt;</span></span><br><span class="line">  	<span class="tag">&lt;<span class="name">servlet-class</span>&gt;</span>com.oracle.servlet.TestServlet<span class="tag">&lt;/<span class="name">servlet-class</span>&gt;</span></span><br><span class="line">  	<span class="tag">&lt;<span class="name">init-param</span>&gt;</span> </span><br><span class="line">   		<span class="tag">&lt;<span class="name">param-name</span>&gt;</span>remoteAddress<span class="tag">&lt;/<span class="name">param-name</span>&gt;</span></span><br><span class="line">    	<span class="tag">&lt;<span class="name">param-value</span>&gt;</span>202.97.233.50<span class="tag">&lt;/<span class="name">param-value</span>&gt;</span> </span><br><span class="line">  	<span class="tag">&lt;/<span class="name">init-param</span>&gt;</span> </span><br><span class="line">		<span class="tag">&lt;<span class="name">load-on-startup</span>&gt;</span>1<span class="tag">&lt;/<span class="name">load-on-startup</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">servlet</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">servlet-mapping</span>&gt;</span></span><br><span class="line">  	<span class="tag">&lt;<span class="name">servlet-name</span>&gt;</span>TestServlet<span class="tag">&lt;/<span class="name">servlet-name</span>&gt;</span></span><br><span class="line">  	<span class="comment">&lt;!-- 自定义的URL  建议带/servlet/ --&gt;</span></span><br><span class="line">  	<span class="tag">&lt;<span class="name">url-pattern</span>&gt;</span>/servlet/test<span class="tag">&lt;/<span class="name">url-pattern</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">servlet-mapping</span>&gt;</span></span><br></pre></td></tr></table></figure>

<p>获取初始化参数，先获取<strong>ServletConfig</strong>对象</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">String servletParam = <span class="keyword">this</span>.getServletConfig.getInitParameter(<span class="string">&quot;servletParam&quot;</span>)</span><br><span class="line">String contextParam = request.getServletContext().getInitParameter(<span class="string">&quot;contextParam&quot;</span>);</span><br></pre></td></tr></table></figure>

<p>获取session对象：HttpSession session = request.getSession()</p>
<p>获取servletContext对象：SerlvletContext application = request.getServletContext()</p>
<p>​                                          request.getSession.getServletContext()</p>
<p>​                                          this.getServletConfig.getServletContext()</p>
<p>请求转发跳转：</p>
<ul>
<li>request.getRequestDispatcher(url).forward(request,response)，对应JSP动作中&lt;jsp:forward page=””/&gt;</li>
<li>request.getRequestDispatcher(url).include(request,response)，对应JSP动作&lt;jsp:include page=””/&gt;</li>
</ul>
<p>重定向跳转（返回301）：response.sendRedirect(request.getContextPath+”/b.jsp”) </p>
<h2 id="Filter"><a href="#Filter" class="headerlink" title="Filter"></a>Filter</h2><p>实现Filter接口就成为了过滤器，重写doFilter，拦截jsp和servlet请求，包括重定向请求，请求转发跳转请求</p>
<ul>
<li><p>使用web.xml配置，类似servlet</p>
</li>
<li><p>使用注解配置（实际开发）</p>
</li>
</ul>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@WebFilter(&#123;&quot;*.jsp&quot;,&quot;/controller/*&quot;&#125;)</span></span><br></pre></td></tr></table></figure>

<ul>
<li>重写doFilter方法，filterchain.doFilter(request, response)写在最后放行，不放行，进行重定向跳转或者请求转发跳转就可以了</li>
</ul>
<h2 id="Listener"><a href="#Listener" class="headerlink" title="Listener"></a>Listener</h2><p>用一个类实现这些Listener接口就生成了对应的监听器</p>
<ul>
<li>HttpSessionListener接口</li>
</ul>
<p>当服务器创建了一个Session对象，执行实现类的createSession方法。通常用来坚挺在线人数</p>
<p>最常见用处：<strong>统计当前在线人数</strong>，</p>
<p>简易统计在线人数（不太行，一般用redis计数可以）：</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">private</span> <span class="keyword">int</span> count;</span><br><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">sessionCreated</span><span class="params">(HttpSessionEvent httpSessionEvent)</span> </span>&#123;</span><br><span class="line">   count++;</span><br><span class="line">   <span class="comment">//用这个监听器提供的event获取到session，再获取到application对象存入</span></span><br><span class="line">	httpSessonEvent.getSession().getServletContext().setAttribute(<span class="string">&quot;count&quot;</span>, count);</span><br><span class="line">&#125;</span><br><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">sessionDestroy</span><span class="params">()</span></span>&#123;&#125;</span><br></pre></td></tr></table></figure>

<ul>
<li>ServletContextListener</li>
</ul>
<p>监听application对象的创建和销毁（服务器启动和销毁），服务器启动时想要启动一些多线程，放置数据，可以配置这个对象</p>
<ul>
<li>ServletContextAttributeListener</li>
</ul>
<p>监听application对象的属性操作，如新建，删除，修改一个Attribute属性触发</p>
<h2 id="Jsp基本语法"><a href="#Jsp基本语法" class="headerlink" title="Jsp基本语法"></a>Jsp基本语法</h2><ol>
<li><p><strong>&lt;%  java  %&gt; 自动放在生成servlet的service方法中</strong></p>
</li>
<li><p><strong>&lt;%!  java   %&gt;自动放在生成servlet中</strong> ，很少使用，因为很少定义全局变量，比如要写新的方法给service调用就写这里面，但是没必要把方法封装在jsp中，单独写一个类就行</p>
</li>
<li><p>**&lt;%= 有返回值Java代码 %&gt;**，等于 &lt;%  out.print( 返回值代码);  %&gt;，将值打印到HTML中</p>
</li>
<li><p>JSP支持注释：jsp注释：&lt;%–  –%&gt;、html注释（会生成到html代码中）：<!-- -->   </p>
<p>​                        Java注释（会生成在servlet中）：//，/*  */</p>
</li>
</ol>
<h2 id="JSP九大内置对象"><a href="#JSP九大内置对象" class="headerlink" title="JSP九大内置对象"></a>JSP九大内置对象</h2><p><strong>内置对象</strong>：jsp生成的servlet中的service方法中，生成了已经赋完值的一些对象，这些变量引用的对象叫内置对象，可以在jsp的Java代码中使用，很少使用</p>
<p>容器对象：attribute是一个Map（String，Object）：setAttribute()、getAttribute(key)、<strong>removeAttribute(key)</strong></p>
<h4 id="1-response对象（HttpServletResponse）"><a href="#1-response对象（HttpServletResponse）" class="headerlink" title="1. response对象（HttpServletResponse）"></a>1. response对象（HttpServletResponse）</h4><p>返回数据、设置HTTP头，</p>
<p>getWriter()、getOutputStream()、setContentType()</p>
<p>setHeader(“Cache-Control”,”no-cache”)。SSM代替：&lt;mvc:cache-control max-age=”3600” cache-public=”true”/&gt;</p>
<p>addCoodie( Cookie对象 )、response.setStatus(302)、response.sendError(404)：并且会向web.xml中设置的错误页面跳转</p>
<h4 id="2-request对象（HttpServletRequest）"><a href="#2-request对象（HttpServletRequest）" class="headerlink" title="2. request对象（HttpServletRequest）"></a>2. request对象（HttpServletRequest）</h4><p>生命周期：HTTP请求到达Servlet，就创建一个request对象，当servlet返回response时，request生命周期结束</p>
<p>getParameter(key) 、getParameterValues(key)、getParemeterNames()  、getParemeterMap() </p>
<p> <strong>request.getCookies();</strong></p>
<p>获取请求方式：getmethod()、获取IP：getRemoteAddr()、获取客户端主机名：getRemoteHost()</p>
<ul>
<li>URL全路径（包含域名）：getRequestURL()</li>
<li>URI资源路径（不包含域名）：getRequestURI()，相比ServeletPath()带项目名，一般使用这个来获取</li>
<li>当前这个controller的路径：getServletPath()。如/test，war包和jar包项目都一样，不带项目名字</li>
<li>获取ServletContext对象：getServletContext</li>
</ul>
<h4 id="3-ServletContext"><a href="#3-ServletContext" class="headerlink" title="3. ServletContext"></a>3. ServletContext</h4><ul>
<li>上下文路径：request.getServletContext().get<strong>ContextPath</strong>() ，一般来说就是项目名，如/shop，为root项目时，为空</li>
<li>war包项目下的绝对路径：request.getServletContext().getRealPath(“/upload”)，Springboot的jar包项目不要使用</li>
</ul>
<h4 id="4-session（HttpSession）"><a href="#4-session（HttpSession）" class="headerlink" title="4. session（HttpSession）"></a>4. session（HttpSession）</h4><p>调用request.getSession方法时生成，先通过request.getCookies获取到所有cookie，再查有没有name等于JSESSIONID并且在内存中存在的cookie，有的话，新session引用指向已存在的session（同时也会addCookie）。</p>
<p>不存在就新建一个session对象，设置name=sessionID，value=sessionID值，保存到到response中，再次访问时，通过sessionID，找到服务器中的session。维持一个状态。Cookie默认关闭浏览器就销毁（即Max-age默认为-1）。<a target="_blank" rel="noopener" href="https://zhuanlan.zhihu.com/p/63061864">cookie，session，token</a></p>
<p>获取当前request的session里的sessionId：session.getId()</p>
<p>立即销毁：session.invalidate()</p>
<p>定时销毁：session.setMaxInactiveInterval(60 * 60 * 3)</p>
<p>tomcat服务器的session是对session无操作时，默认30分钟。可以通过tomcat的web.xml或者项目的web.xml配置有效期：</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">session-config</span>&gt;</span> </span><br><span class="line">  <span class="tag">&lt;<span class="name">session-timeout</span>&gt;</span>10<span class="tag">&lt;/<span class="name">session-timeout</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">session-config</span>&gt;</span></span><br></pre></td></tr></table></figure>

<p>application（ServletContext）、pageContext（PageContext类）</p>
<p>服务器可以设置cookie中的Path属性，只有当cookie访问服务器的路径为指定的时，这个cookie才有效</p>
<h4 id="内置对象"><a href="#内置对象" class="headerlink" title="内置对象"></a>内置对象</h4><ul>
<li><p>out对象（JspWriter）</p>
<p>out对象是的实例，JspWriter关联了PrintWriter对象。print()  和println() 、flush()、clearBuffer()、getBufferSize()</p>
</li>
<li><p><strong>config</strong>（Servlet的配置对象）、<strong>exception</strong>（异常对象）和<strong>page</strong>（ 很少使用，就是jsp转化成servlet后的实例，this）</p>
</li>
</ul>
<h4 id="JSP三大指令元素"><a href="#JSP三大指令元素" class="headerlink" title="JSP三大指令元素"></a>JSP三大指令元素</h4><p>在页面最前面写入**&lt;%@ 指令 指令动作 %&gt;**</p>
<ul>
<li><p>page：指定页面级别配置，指定pageEncoding和contentType和导包</p>
<figure class="highlight jsp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">&lt;%@ page contentType=<span class="string">&quot;text/html; charset=UTF-8&quot;</span>%&gt;</span><br><span class="line">  等同于response.setEncording();</span><br><span class="line">  &lt;%@ page <span class="keyword">import</span>=<span class="string">&quot;java.util.Date&quot;</span> %&gt;</span><br></pre></td></tr></table></figure>
</li>
<li><p>Taglib：主要用于导入标签库</p>
<figure class="highlight jsp"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">&lt;%@ taglib uri=<span class="string">&quot;http://java.sun.com/jsp/jstl/core&quot;</span> prefix=<span class="string">&quot;c&quot;</span>%&gt;</span><br></pre></td></tr></table></figure>
</li>
<li><p>include指令：导入jsp</p>
<figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//最终只会会转化成1个servlet，和include动作相似（最常用）</span></span><br><span class="line">&lt;%@ include  file=xxx.jsp&gt;</span><br><span class="line"><span class="comment">// JSP包含标签（动作），表示页面要包含的页面，会转化两个servlet，类似thymeleaf的th:include=&quot;&quot;</span></span><br><span class="line">&lt;jsp:include page=<span class="string">&quot;a.jsp&quot;</span>&gt; </span><br><span class="line"><span class="comment">// JSP跳转标签（动作），相当于request.getrequestDispatcher(&quot;a.jsp&quot;).forward(req,resp);</span></span><br><span class="line">&lt;jsp:forward page=<span class="string">&quot;showUser.jsp&quot;</span>&gt;</span><br><span class="line">	&lt;jsp:param value=<span class="string">&quot;admin@test.com&quot;</span> name=<span class="string">&quot;email&quot;</span>/&gt;</span><br><span class="line">	&lt;jsp:param value=<span class="string">&quot;888888&quot;</span> name=<span class="string">&quot;password&quot;</span>/&gt;</span><br><span class="line">&lt;/jsp:forward&gt;</span><br></pre></td></tr></table></figure>

</li>
</ul>
<h2 id="EL表达式"><a href="#EL表达式" class="headerlink" title="EL表达式"></a>EL表达式</h2><p>EL表达式只能在JSP中使用，不能写在jsp的Java代码中，就是为了替代&lt;%= %&gt;或者&lt;c:out&gt; ，用EL表达式如果没取到值自动处理为空字符串，不会空指针（null）异常。</p>
<h4 id="1-域对象"><a href="#1-域对象" class="headerlink" title="1. 域对象"></a>1. 域对象</h4><p>有四个域范围对象，对应jsp四个域对象：pageScope、requestScope、sessionScope、applicationScope</p>
<ol>
<li><p>${域范围对象.username}</p>
</li>
<li><p>省略域范围对象，按顺序从page/request/session/application对应的域对象</p>
<p>如果获取到的Attribute是map集合：${ 域范围对象.key1[“key2”]}取得map中的元素</p>
</li>
</ol>
<h4 id="2-param"><a href="#2-param" class="headerlink" title="2. param"></a>2. param</h4><p>${param.username}代表执行getParameter(“username”)，很少用</p>
<h4 id="3-pageContext对象"><a href="#3-pageContext对象" class="headerlink" title="3. pageContext对象"></a>3. pageContext对象</h4><p>属于page作用域名，一般用来在获取request，然后获取到项目路径：**${pageContext.request.contextPath}**或者</p>
<h4 id="4-EL表达式运算符"><a href="#4-EL表达式运算符" class="headerlink" title="4. EL表达式运算符"></a>4. EL表达式运算符</h4><p>jEL表达式取值以外，还可以使用EL表达式进行算术运算和逻辑运算，逻辑和比较运算符常用于&lt;c:if&gt;中</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">$&#123;p.age+<span class="number">1</span> &#125;	<span class="comment">//算数运算符</span></span><br><span class="line">$&#123;!(p.age == <span class="number">1</span>) &#125;	<span class="comment">//比较运算符（eq）</span></span><br><span class="line">$&#123;p.age==<span class="number">1</span> &amp;&amp; p.age==<span class="number">20</span> &#125;	<span class="comment">//逻辑运算符（and）</span></span><br></pre></td></tr></table></figure>

<h2 id="JSTL"><a href="#JSTL" class="headerlink" title="JSTL"></a>JSTL</h2><p>在jsp中创建的javabean对象，<strong>默认page</strong>作用域，可以指定保存其他作用域。</p>
<figure class="highlight jsp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">&lt;!-- 用原生JSP标签生成并设置JavaBean,很少用 --&gt;</span><br><span class="line">&lt;jsp:useBean id=<span class="string">&quot;person&quot;</span> <span class="class"><span class="keyword">class</span></span>=<span class="string">&quot;com.lee.Person&quot;</span> scope=<span class="string">&quot;request&quot;</span> typeSpec /&gt;</span><br><span class="line">&lt;jsp:setProperty name=<span class="string">&quot;person&quot;</span> property=<span class="string">&quot;name&quot;</span> value=<span class="string">&quot;jack&quot;</span>/&gt;</span><br><span class="line">&lt;jsp:getProperty name=<span class="string">&quot;demo&quot;</span> property=<span class="string">&quot;name&quot;</span>/&gt;</span><br><span class="line"></span><br><span class="line">&lt;!-- 利用JSTL的方式设置javabean的属性--&gt;</span><br><span class="line">&lt;c:set target=<span class="string">&quot;$&#123;person&#125;&quot;</span> property=<span class="string">&quot;name&quot;</span> value=<span class="string">&quot;lee&quot;</span>/&gt;</span><br><span class="line"></span><br><span class="line">&lt;!-- 设置name的属性，不是新建 --&gt;</span><br><span class="line">&lt;c:<span class="keyword">catch</span> <span class="keyword">var</span>=<span class="string">&quot;没有name这个参数&quot;</span>&gt;</span><br><span class="line">  &lt;c:set <span class="keyword">var</span>=<span class="string">&quot;name&quot;</span> value=<span class="string">&quot;lee&quot;</span> scope=<span class="string">&quot;request&quot;</span>/&gt;</span><br><span class="line">&lt;/c:catch&gt;</span><br><span class="line">&lt;c:remove <span class="keyword">var</span>=<span class="string">&quot;name&quot;</span>/&gt;</span><br></pre></td></tr></table></figure>

<h4 id="forEach（迭代标签）"><a href="#forEach（迭代标签）" class="headerlink" title="forEach（迭代标签）"></a>forEach（迭代标签）</h4><p>迭代标签还有fortokens()，用分割符分割字符串再迭代输出，在forEach的每次循环中，自动先向pageContext的attribute存储本次循环的状态对象，状态对象中包含了index和count属性代表循环的索引和循环次数</p>
<p>items：要循环的对象，只能是Java集合或者数组、var：每个元素、begin：从哪个索引开始，默认0、end：默认size-1</p>
<p>step，索引增加次数， 默认是1、varstatus 获取循环索引，count数</p>
<figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br></pre></td><td class="code"><pre><span class="line">&lt;!-- 我们通过循环打印一个表格--&gt;</span><br><span class="line">&lt;% </span><br><span class="line">	List&lt;Employee&gt; empList = (List&lt;Employee&gt;)request.getAttriute(<span class="string">&quot;empList&quot;</span>);</span><br><span class="line">	<span class="keyword">for</span>(Employee emp:empList) &#123; </span><br><span class="line">%&gt;</span><br><span class="line">&lt;table&gt;</span><br><span class="line">	&lt;tr&gt;</span><br><span class="line">    &lt;td&gt;&lt;%= emp.getName()%&gt;&lt;/td&gt;</span><br><span class="line">    &lt;td&gt;&lt;%= emp.getNo() %&gt;&lt;/td&gt;</span><br><span class="line">  &lt;/tr&gt;    </span><br><span class="line">&lt;/table&gt;</span><br><span class="line">&lt;% &#125; %&gt;</span><br><span class="line"></span><br><span class="line">&lt;!-- 用EL表达式+JSTL代替--&gt;</span><br><span class="line">&lt;c:forEach <span class="keyword">var</span>=<span class="string">&quot;emp&quot;</span> iterms=<span class="string">&quot;$&#123;requestScope.empList&#125;&quot;</span> &gt;</span><br><span class="line">  &lt;table&gt;</span><br><span class="line">	&lt;tr&gt;</span><br><span class="line">    &lt;td&gt;$&#123;emp.name&#125;&lt;/td&gt;</span><br><span class="line">    &lt;td&gt;$&#123;emp.no&#125;&lt;/td&gt;</span><br><span class="line">  &lt;/tr&gt;    </span><br><span class="line">&lt;/table&gt;</span><br><span class="line">&lt;/c:forEach&gt;</span><br></pre></td></tr></table></figure>

<h4 id="lt-c-if-gt-（条件标签）"><a href="#lt-c-if-gt-（条件标签）" class="headerlink" title="&lt;c:if&gt;（条件标签）"></a>&lt;c:if&gt;（条件标签）</h4><p>标签中使用test属性+EL表达式条件判断</p>
<figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">&lt;c:<span class="keyword">if</span> test=<span class="string">&quot;$&#123;count==10 &#125;&quot;</span>&gt;</span><br><span class="line">  is ten</span><br><span class="line">&lt;/c:if&gt;</span><br><span class="line">&lt;c:<span class="keyword">if</span> test=<span class="string">&quot;$&#123;count!=10 &#125;&quot;</span>&gt;</span><br><span class="line">  is not ten</span><br><span class="line">&lt;/c:if&gt;</span><br></pre></td></tr></table></figure>

<h4 id="lt-c-choose-when-otherwise-gt"><a href="#lt-c-choose-when-otherwise-gt" class="headerlink" title="&lt;c:choose-when-otherwise&gt;"></a>&lt;c:choose-when-otherwise&gt;</h4><figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line">&lt;c:choose&gt;</span><br><span class="line">  &lt;c:when test=<span class="string">&quot;$&#123;count==5 &#125;&quot;</span>&gt;</span><br><span class="line">    is five</span><br><span class="line">  &lt;/c:when&gt;</span><br><span class="line">  &lt;c:when test=<span class="string">&quot;$&#123;count==10 &#125;&quot;</span>&gt;</span><br><span class="line">    is ten</span><br><span class="line">  &lt;/c:when&gt;</span><br><span class="line">  &lt;c:otherwise&gt;</span><br><span class="line">    other</span><br><span class="line">  &lt;/c:otherwise&gt;</span><br><span class="line">&lt;/c:choose&gt;</span><br></pre></td></tr></table></figure>

<h4 id="格式化标签库"><a href="#格式化标签库" class="headerlink" title="格式化标签库"></a>格式化标签库</h4><p>除了核心标签库，JSTL还提供了格式化标签库、SQL标签库、XML标签库和常用函数标签库等。日期对象格式化成指定对象，</p>
<figure class="highlight"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">&lt;fmt:formatDate value=&quot;$&#123;e.hireDate &#125;&quot; pattern=&quot;yyyy-MM-dd&quot;&gt;&lt;/fmt:formatDate&gt;</span><br></pre></td></tr></table></figure>

<h4 id="自定义标签"><a href="#自定义标签" class="headerlink" title="自定义标签"></a>自定义标签</h4><ol>
<li>创建处理标签的Java类，让这个类<strong>继承SimpleTagSupport</strong>，重写doTag方法，getJspContext只有继承这个类才能够使用getJspContext之类的方法</li>
</ol>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">TestTag</span> <span class="keyword">extends</span> <span class="title">SimpleTagSupport</span></span>&#123;</span><br><span class="line">  <span class="meta">@Override</span> </span><br><span class="line">  <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">doTag</span><span class="params">()</span> <span class="keyword">throws</span> JspException, IOException </span>&#123;</span><br><span class="line">    JspWriter out = getJspContext().getOut();</span><br><span class="line">    out.println(<span class="string">&quot;Hello Custom Tag!&quot;</span>);</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>


<ol start="2">
<li>在WEB-INF下创建后缀是.tld的标签库描述文件</li>
</ol>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">tag</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">name</span>&gt;</span>hello<span class="tag">&lt;/<span class="name">name</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">tag-class</span>&gt;</span>test.Tag<span class="tag">&lt;/<span class="name">tag-class</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">body-content</span>&gt;</span>empty<span class="tag">&lt;/<span class="name">body-content</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">tag</span>&gt;</span></span><br></pre></td></tr></table></figure>

<ol start="3">
<li>在其taglib中加入tag标签</li>
</ol>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">@taglib</span> <span class="attr">prefix</span>=<span class="string">&quot;my&quot;</span> <span class="attr">uri</span>=<span class="string">&quot;test.Tag&quot;</span></span></span><br></pre></td></tr></table></figure>

          <h1 id="反射"><a href="#反射" class="headerlink" title="反射"></a>反射</h1><p>很多框架的源码底层都是用反射实现。</p>
<p>类加载器，对class文件加载一次（方法区），以后创建，反射的目的在于动态的调用未知的类。</p>
<ul>
<li>反射：在运行时加载、探知、使用编译期间完全未知的class文件</li>
<li>自审</li>
</ul>
<h2 id="Class类（类对象）"><a href="#Class类（类对象）" class="headerlink" title="Class类（类对象）"></a>Class类（类对象）</h2><h4 id="创建Class对象"><a href="#创建Class对象" class="headerlink" title="创建Class对象"></a>创建Class对象</h4><ol>
<li><p>Class class = Class.forName(“类的全路径”);  </p>
<p>当类库中没有这个类时，这种方式编译仍然通过，在里面放入string，动态改变string的值</p>
</li>
<li><p>Class class = 类.class;</p>
</li>
<li><p>Class class = 对象.getClass();</p>
<p>比如方法传入参数是一个Object，obj.getClass()</p>
</li>
</ol>
<h4 id="Class类的方法："><a href="#Class类的方法：" class="headerlink" title="Class类的方法："></a>Class类的方法：</h4><p>类的包、属性、方法都是对象。</p>
<ul>
<li><p>获得类名：getSimpleName());</p>
</li>
<li><p>获得包名类名：getName());</p>
</li>
<li><p>获得包对象：getPackage(); </p>
<p>可以获得包的版本号</p>
</li>
<li><p>获得类加载器对象：getClassLoader()</p>
<p>JRE（rt.jar）、类库（String）、应用程序类加载器。</p>
</li>
<li><p>返回class对象对应类的对象，返回Object类型。**newInstance() **</p>
<p>调用了类的无参构造器，没有则异常，所以Spring中注入Bean需要无参数构造器</p>
<p>Person p = (Person)class.newInstance();</p>
</li>
<li><p>获得对象构造器的Constructor对象：getDeclareConstructor(参数列表的Class对象)</p>
<p>获得以后，用构造器对象c.newInstance(参数)</p>
</li>
<li><p>获得对应的Field对象/Fields：getDeclaredField(String filedName)</p>
</li>
<li><p>获得对象方法的Method对象：getDeclareMethod(String methodName, 参数的Class对象)</p>
</li>
</ul>
<h4 id="Field对象"><a href="#Field对象" class="headerlink" title="Field对象"></a>Field对象</h4><p>一个属性是一个属性对象。用Class对象（类对象）.getDeclareField(String)、getDeclareFields(String[])</p>
<p>属性对象可以获取属性的信息，比如getType返回属性类型的class对象，getName</p>
<p><strong>通过属性对象给实例对象赋值</strong>：field.set(obj,“tom”) 。不受到访问权限的限制</p>
<p>通过属性对象获取时期对象中的值：field.get(obj)</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 获得类对象中所有的属性，并给每一个属性</span></span><br><span class="line">Field[] fields = cls.getDeclaredFields(); </span><br><span class="line"><span class="keyword">for</span>(Field f:fields) &#123;</span><br><span class="line">  <span class="comment">// 打印属性名</span></span><br><span class="line">  System.out.println(f.getName()); </span><br><span class="line">  f.setAccessible(<span class="keyword">true</span>);</span><br><span class="line">  <span class="keyword">if</span>(<span class="string">&quot;name&quot;</span>.equals(f.getName())) &#123;</span><br><span class="line">    f.set(obj, <span class="string">&quot;tom&quot;</span>); </span><br><span class="line">  &#125; </span><br><span class="line">  <span class="keyword">if</span>(<span class="string">&quot;age&quot;</span>.equals(f.getName())) &#123;</span><br><span class="line">    f.set(obj, <span class="number">20</span>);</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">if</span>(<span class="string">&quot;height&quot;</span>.equals(f.getName())) &#123;</span><br><span class="line">    f.set(obj, <span class="number">1.7</span>);</span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">static</span> List <span class="title">getList</span><span class="params">(String path,Class cls,String[] fieldNames)</span> </span>&#123;</span><br><span class="line">  List list = <span class="keyword">new</span> ArrayList();</span><br><span class="line">    <span class="comment">//IO流读文件 普通流转化成Buffer流</span></span><br><span class="line">  FileReader fr = <span class="keyword">new</span> FileReader(path);</span><br><span class="line">  BufferedReader br = <span class="keyword">new</span> BufferedReader(fr);</span><br><span class="line">  String temp = <span class="keyword">null</span>;</span><br><span class="line">  <span class="keyword">while</span>((temp=br.readLine())!=<span class="keyword">null</span>) &#123; </span><br><span class="line">    <span class="comment">//循环读出每一行 按,拆分成各个数据 </span></span><br><span class="line">    String[] values = temp.split(<span class="string">&quot;,&quot;</span>); </span><br><span class="line">    <span class="comment">//按fieldNames的顺序 填充到 创建的对象的属性中</span></span><br><span class="line">    Object obj = cls.newInstance();</span><br><span class="line">    <span class="keyword">for</span>(<span class="keyword">int</span> i = <span class="number">0</span>;i&lt;fieldNames.length;i++) &#123; </span><br><span class="line">      <span class="comment">// 获取哪些属性的Filed对象</span></span><br><span class="line">      Field field = cls.getDeclaredField(fieldNames[i]); </span><br><span class="line">      field.setAccessible(<span class="keyword">true</span>); </span><br><span class="line">      <span class="comment">// 三个不同类型，用getType区分</span></span><br><span class="line">      <span class="keyword">if</span>(String.class==field.getType()) &#123;</span><br><span class="line">        field.set(obj, values[i]);</span><br><span class="line">      &#125;<span class="keyword">else</span> <span class="keyword">if</span>(<span class="keyword">int</span>.class==field.getType()) &#123;</span><br><span class="line">        field.set(obj, Integer.parseInt(values[i])); </span><br><span class="line">      &#125;<span class="keyword">else</span> <span class="keyword">if</span>(<span class="keyword">double</span>.class==field.getType()) &#123;</span><br><span class="line">        field.set(obj, Double.parseDouble(values[i])); </span><br><span class="line">      &#125;</span><br><span class="line">    &#125; </span><br><span class="line">    list.add(obj);</span><br><span class="line">		<span class="keyword">return</span> list;</span><br><span class="line">&#125; </span><br><span class="line">  </span><br><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">static</span> <span class="keyword">void</span> <span class="title">main</span><span class="params">(String[] args)</span> </span>&#123;</span><br><span class="line">  <span class="comment">// 获取对象非常灵活</span></span><br><span class="line">List list = getList(<span class="string">&quot;d:/info.txt&quot;</span>,Book.class,<span class="keyword">new</span> String[] &#123;<span class="string">&quot;name&quot;</span>,<span class="string">&quot;author&quot;</span>,<span class="string">&quot;price&quot;</span>&#125;); </span><br><span class="line">  <span class="keyword">for</span>(Object obj:list) &#123;</span><br><span class="line">    Book b = (Book)obj;</span><br><span class="line">    System.out.println(b.getName()+b.getAuthor()+b.getPrice()); </span><br><span class="line">  &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h4 id="Method对象"><a href="#Method对象" class="headerlink" title="Method对象"></a>Method对象</h4><p>class.getDelareMethod(String methodName，Class…)和getDeclareMethods(String[]、Class[])</p>
<p>第一个参数写方法名，第二个参数写传入参数的Class对象，</p>
<p><strong>通过方法对象调用实例对象的方法</strong>：method.invoke(obj,与参数列表对应的参数)</p>
<p>通过方法对象获取参数对象：get</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">Class cls = Class.forName(<span class="string">&quot;com.oracle.pjt0512.Person&quot;</span>); </span><br><span class="line">Method method1 = cls.getDeclaredMethod(<span class="string">&quot;run&quot;</span>); </span><br><span class="line">Object obj = cls.newInstance(); </span><br><span class="line">Integer integer = (Integer)method1.invoke(obj); </span><br><span class="line">System.out.println(integer); </span><br><span class="line">Method method2 = cls.getDeclaredMethod(<span class="string">&quot;method&quot;</span>, String.class,<span class="keyword">int</span>.class);</span><br><span class="line">method2.invoke(obj, <span class="string">&quot;test&quot;</span>,<span class="number">10</span>);</span><br></pre></td></tr></table></figure>

<h2 id="annotation注解"><a href="#annotation注解" class="headerlink" title="annotation注解"></a>annotation注解</h2><p>annotation即注解，提供额外的数据信息，直接用@注解接口名去调用。注解对于标注的对象没有直接影响，不与代码直接交互，在源代码的编译后的class文件中，不会出现注解相关代码，是给编译器看的注释，<strong>注解是继承Annotation接口的接口</strong>，Java默认提供的五种元注解（修饰注解的注解）：Inherited、</p>
<p>Java三大内置注解：Deprecated、SuppressWarnings(“all”)、Override</p>
<h4 id="定义注解"><a href="#定义注解" class="headerlink" title="定义注解"></a><a target="_blank" rel="noopener" href="https://juejin.im/post/5b45bd715188251b3a1db54f">定义注解</a></h4><ul>
<li>只有一个value属性时，直接写值。多个属性用逗号隔开）</li>
<li>属性设置了默认值时，可以不写。有多个属性且没有设默认值时，调用注解的地方必须写</li>
<li>注解只支持：基本数据类型、String、ElementType（枚举）</li>
<li>如果注解的值时String[ ]，可以只写一个String参数，接受 String[ ] 时，需要用 { } 接受</li>
</ul>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 注解的位置，Type是类/接口/枚举，FILED、METHOD、PARAMETOR</span></span><br><span class="line"><span class="meta">@Target(ElementType.TYPE)</span></span><br><span class="line"><span class="comment">// 注解的生命周期，source编译期间，class类加载期间，runtime类运行期间（一直保持，自定义注解通常选这个）</span></span><br><span class="line"><span class="meta">@Retention(RetentionPolicy.SOURCE)</span></span><br><span class="line"><span class="comment">// 能被子类继承</span></span><br><span class="line"><span class="meta">@inherited</span></span><br><span class="line"><span class="comment">// 注解类将会被javadoc类处理</span></span><br><span class="line"><span class="meta">@Documented</span></span><br><span class="line"><span class="keyword">public</span> <span class="meta">@interface</span> TestAnno&#123;</span><br><span class="line">  <span class="function">String <span class="title">value</span><span class="params">()</span></span>;</span><br><span class="line">  String[] values();</span><br><span class="line">  <span class="function"><span class="keyword">int</span> <span class="title">age</span><span class="params">()</span> <span class="keyword">default</span> age.18</span>;</span><br><span class="line">  <span class="comment">// TestAnno.Color.RED</span></span><br><span class="line">  <span class="class"><span class="keyword">enum</span> <span class="title">Color</span></span>&#123;BLACK,RED&#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h4 id="反射读取注解"><a href="#反射读取注解" class="headerlink" title="反射读取注解"></a>反射读取注解</h4><ul>
<li>通过类对象/属性对象，<strong>获得类/属性里面的注解对象</strong></li>
</ul>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 通过反射，获取类的Class对象，再用其方法，参数传入注解的类对象</span></span><br><span class="line">TestAnno testano = cls.getDeclaredAnnotation(TestAnno.class);</span><br><span class="line"><span class="comment">// 属性上面的注解</span></span><br><span class="line">field.getDeclareAnnotation(TestAnno.class);</span><br><span class="line"><span class="comment">// 方法参数的注解，需要先获取方法参数对象</span></span><br><span class="line">Parameter[] parameter = method.getParametes();</span><br><span class="line">parameter.getAnnotation(TestAnno.class);</span><br><span class="line"></span><br><span class="line">读取value这个String属性：testanon.value();</span><br></pre></td></tr></table></figure>

<p>参考：<a target="_blank" rel="noopener" href="https://blog.csdn.net/briblue/article/details/73824058">https://blog.csdn.net/briblue/article/details/73824058</a></p>
<h2 id="枚举"><a href="#枚举" class="headerlink" title="枚举"></a><a target="_blank" rel="noopener" href="https://blog.csdn.net/veryitman/article/details/7945020">枚举</a></h2><p>ordinal()得到序列号。<a target="_blank" rel="noopener" href="https://blog.csdn.net/javazejian/article/details/71333103">枚举进阶</a></p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 普通枚举类，枚举对象</span></span><br><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">enum</span> <span class="title">ServiceResult</span></span>&#123;</span><br><span class="line">  <span class="comment">// 里面有ORDER和SHOPPING两个常量对象，他们时ServiceResult的静态对象</span></span><br><span class="line">  ORDERERROR(<span class="string">&quot;生成订单异常！&quot;</span>),</span><br><span class="line">  SHOPPINGEORRO(<span class="string">&quot;购物车数据异常！&quot;</span>)</span><br><span class="line">  <span class="comment">// 定义属性就是他的值</span></span><br><span class="line">  <span class="keyword">private</span> String result;</span><br><span class="line">  ServiceResultEnum(String result) &#123;</span><br><span class="line">    <span class="keyword">this</span>.result = result;</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="function"><span class="keyword">public</span> String <span class="title">getResult</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    <span class="keyword">return</span> result;</span><br><span class="line">  &#125;</span><br><span class="line">  </span><br><span class="line">&#125; </span><br><span class="line"></span><br><span class="line"><span class="comment">// 实现接口的枚举单例</span></span><br><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">interface</span> <span class="title">MySingleton</span> </span>&#123;</span><br><span class="line">    <span class="function"><span class="keyword">void</span> <span class="title">doSomething</span><span class="params">()</span></span>;</span><br><span class="line">&#125;</span><br><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">enum</span> <span class="title">Singleton</span> <span class="keyword">implements</span> <span class="title">MySingleton</span> </span>&#123;</span><br><span class="line">    INSTANCE &#123;</span><br><span class="line">        <span class="meta">@Override</span></span><br><span class="line">        <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">doSomething</span><span class="params">()</span> </span>&#123;</span><br><span class="line">           <span class="comment">// 这是我的单例方法，</span></span><br><span class="line">        &#125;</span><br><span class="line">    &#125;;</span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">static</span> MySingleton <span class="title">getInstance</span><span class="params">()</span> </span>&#123;</span><br><span class="line">        <span class="keyword">return</span> Singleton.INSTANCE;</span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h1 id="IO流"><a href="#IO流" class="headerlink" title="IO流"></a>IO流</h1><p>通过IO流实现在内存，硬盘或不同平台间文件的传输。</p>
<p><strong>进行IO流操作后需要关流，否则会一直占用资源</strong>，当其他请求访问时将会发生Runtime异常。另外字符流不close或者不flush，会导致当前写入或者读取失败，因为字符流使用了缓冲区，不关流或flush是无法将数据传送到硬盘或者读取到内存的。</p>
<p>IO流常用方法：write(数据)、read(接收返回数据)。<br><strong>无参read方法返回一个字节/字符，读到底了，返回-1；</strong><br><strong>有参read方法读取数据到参数并返回的字符/字节长度</strong></p>
<p>输出流默认构造方法会覆盖原文本文件，加true表示追加到文本文件</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">Writer out = <span class="keyword">new</span> FileWriter(file,<span class="keyword">true</span>);</span><br></pre></td></tr></table></figure>

<h2 id="字节流"><a href="#字节流" class="headerlink" title="字节流"></a>字节流</h2><p>InputStream和OutputStream是字节流父类，是抽象方法，必须通过子类实例化。</p>
<p>字节流写入字节数据，没有缓冲区，直接保存或读取硬盘字节文件。</p>
<h4 id="1-FileInputStream-FileOutputStream"><a href="#1-FileInputStream-FileOutputStream" class="headerlink" title="1. FileInputStream/FileOutputStream"></a>1. FileInputStream/FileOutputStream</h4><p>与<strong>硬盘有关</strong>的操作使用<strong>File型输入输出流</strong>。</p>
<p>写入字符数据时，需要我们手动将内存中的字符编码成字节（str.getBytes(“UTF-8”)），再写入字节数组到硬盘，可以直接write整个字节数组，也可以循环字节数组，一个一个写入。</p>
<p>可以在构造方法传入要操作的<strong>文件路径字符串</strong>，也可以用<strong>File类对象（推荐）</strong>，两种方法指定的<strong>路径不存在时自动创建文件</strong>。File类：抽象的方式表示一个文件路径，用来操作文件</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><span class="line"> InputStream in = <span class="keyword">new</span> FileInputStream(file);</span><br><span class="line"> </span><br><span class="line"><span class="comment">// 读取方法1，直接读取全部</span></span><br><span class="line">Byte[] bytes = <span class="keyword">new</span> Byte[<span class="number">1024</span>];</span><br><span class="line"> in.read(bytes);</span><br><span class="line"></span><br><span class="line"><span class="comment">// 读取方法2（最常用！！！！！）</span></span><br><span class="line">Byte[] bytes = <span class="keyword">new</span> Byte[<span class="number">1024</span>];</span><br><span class="line"><span class="keyword">int</span> len = <span class="number">0</span>;</span><br><span class="line"><span class="keyword">int</span> temp = <span class="number">0</span>;</span><br><span class="line"><span class="keyword">while</span>((temp=in.read())!= -<span class="number">1</span>)&#123;</span><br><span class="line">   bytes[len] = (<span class="keyword">byte</span>)temp;</span><br><span class="line">   len++;</span><br><span class="line"> &#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 读取方法3用for循环，只适用于已知文件的字节长度（很少使用，不推荐）</span></span><br><span class="line">Byte[] bytes = <span class="keyword">new</span> Byte[(<span class="keyword">int</span>)file.length()];</span><br><span class="line"> <span class="keyword">for</span>(<span class="keyword">int</span> i=<span class="number">0</span>; i&lt;bytes.length; i++)&#123;</span><br><span class="line">	bytes[i]=(<span class="keyword">byte</span>)in.read();</span><br><span class="line"> &#125;</span><br></pre></td></tr></table></figure>

<p>实现文件复制：<strong>将一个文件用输入流read，返回的字节或字节数组， 直接用另一个文件的输入流直接write，而不需要构建一个字节数组去接收</strong></p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">in = <span class="keyword">new</span> FileInputStream(<span class="string">&quot;/Users/lee/Desktop/a.png&quot;</span>);</span><br><span class="line">out = <span class="keyword">new</span> FileOutputStream(<span class="string">&quot;/Users/lee/Desktop/b.png&quot;</span>);</span><br><span class="line"><span class="keyword">int</span> temp = <span class="number">0</span>;</span><br><span class="line"><span class="keyword">while</span>((temp = in.read())!= -<span class="number">1</span>)&#123;</span><br><span class="line">  out.write((<span class="keyword">byte</span>)temp);</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h4 id="3-BufferedInputStream"><a href="#3-BufferedInputStream" class="headerlink" title="3. BufferedInputStream"></a>3. BufferedInputStream</h4><p>比如下载文件，从服务器文件中一次读一块</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">bis=<span class="keyword">new</span> BufferedInputStream(fis);</span><br><span class="line">OutputStream os=resp.getOutputStream();</span><br><span class="line"><span class="keyword">int</span> i=bis.read(buffer);</span><br><span class="line"><span class="keyword">while</span>(i!=-<span class="number">1</span>)&#123;</span><br><span class="line">  <span class="comment">// write，读取buffer，从buffer的0到i</span></span><br><span class="line">  os.write(buffer,<span class="number">0</span>,i);</span><br><span class="line">  i=bis.read(buffer);</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h4 id="4-BufferedOutputStream"><a href="#4-BufferedOutputStream" class="headerlink" title="4. BufferedOutputStream"></a>4. BufferedOutputStream</h4><p>一次写一块，socket中</p>
<h4 id="对象流"><a href="#对象流" class="headerlink" title="对象流"></a>对象流</h4><p>ObjectInputStream和ObjectOutputStream，接受普通流，方法writeObject和readObject</p>
<p>对象中定义一个一个静态常量的序列号，比较好还原</p>
<h2 id="字符流"><a href="#字符流" class="headerlink" title="字符流"></a>字符流</h2><p>Reader和Writer是所有字符流父类，是最普通基础的。</p>
<p><strong>字符流只能读取和写入字符，使用了缓冲区，并在底层帮我门封装了编码和解码过程。</strong><br>底层写：将内存字符（Unicode形式）进行编码（UTF-8），再通过字节流保存到硬盘<br>底层读：读取字节并解码成字符数组，返回给read(接收的字符数组)。</p>
<h4 id="1-FileWriter-FileReader"><a href="#1-FileWriter-FileReader" class="headerlink" title="1. FileWriter/FileReader"></a>1. FileWriter/FileReader</h4><p>File类字符输入流和输出流用来对文件进行读写：默认底层用UTF-8解码</p>
<p>具体的读写方法和字节流一样。</p>
<h4 id="字节转字符流"><a href="#字节转字符流" class="headerlink" title="字节转字符流"></a>字节转字符流</h4><p>网络编程中字符流一般很少去直接读，默认都按操作系统编码去读。怕编码不一致，一般都是用字节流读，在程序中转化成字符流</p>
<ol>
<li><p>InputStreamReader（常用）</p>
<p>字节输入流按照编码转化成字符输入流，如下面代码，将字节流数据，用GBK编码解码成字符流。一般还会将这个流转化成BufferedReader。</p>
</li>
</ol>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">InputStreamReader in = <span class="keyword">new</span> InputStreamReader(req.getInputStream,<span class="string">&quot;GBK&quot;</span>)</span><br></pre></td></tr></table></figure>

<ol start="2">
<li><p>OutputStreamWriter</p>
<p>字节输出流，按照编码转化成字符输出流，比较少用，也通常转化成BufferedWriter</p>
</li>
</ol>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">OutputStreamWriter osw = <span class="keyword">new</span> OutputStreamWriter(<span class="keyword">new</span> FileOutputStream(<span class="string">&quot;a.txt&quot;</span>), <span class="string">&quot;UTF-8&quot;</span>);</span><br></pre></td></tr></table></figure>

<h4 id="3-BufferedReader（常用）"><a href="#3-BufferedReader（常用）" class="headerlink" title="3. BufferedReader（常用）"></a>3. BufferedReader（常用）</h4><p>缓冲字符流，将普通字符流转户成缓冲字符流。返回一个字符串，不需要我们去定义字符串长度</p>
<p>普通字符流每次read操作都会从底层获取字节转化一次，而BufferedReader则会有缓存区，所以有<strong>多次read操作时，推荐将先创建基础的额FileReader或InputStreamReader再转化成BufferedReader</strong></p>
<p>核心方法：readline()，一行一行读取，返回String，没有下一行了返回null</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">BufferedReader bfr =<span class="keyword">new</span> BufferedReader(<span class="keyword">new</span> FileReader(<span class="string">&quot;test.conf&quot;</span>))</span><br><span class="line"> StringBuffer strBuffer = <span class="keyword">new</span> StringBuffer();</span><br><span class="line"> String temp = <span class="string">&quot;&quot;</span>;</span><br><span class="line"> <span class="keyword">while</span>((temp=bfr.readLine())!=<span class="keyword">null</span>)&#123;</span><br><span class="line">	strBuffer.append(temp);</span><br><span class="line"> &#125;</span><br></pre></td></tr></table></figure>

<h4 id="4-BufferWriter"><a href="#4-BufferWriter" class="headerlink" title="4. BufferWriter"></a>4. BufferWriter</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">bufferWriter.write(message)：在message中，默认一次写一行</span><br></pre></td></tr></table></figure>

<h2 id="对象的序列化"><a href="#对象的序列化" class="headerlink" title="对象的序列化"></a>对象的序列化</h2><p>和Cloneable接口一样是标记接口，虚拟机是否允许反序列化，不仅取决于类路径和功能代码是否一致（这是JDK序列化策略的缺点，一个项目没问题），最好设置一个序列化ID，就是private static final long serialVersionUID = 1L</p>
<ul>
<li><p><strong>实现Serializable接口</strong>（如果存在类依赖，依赖也需要序列化），就可以用ObjectOutputString实现这个序列化。使用<strong>transient</strong>关键字选择不需要序列化的属性，反序列化后，变成初始值，<strong>静态属性不会被序列化</strong>（因为静态属性不属于对象）。</p>
<p>序列化主要是是为了<strong>保存运行时的属</strong>性。</p>
</li>
</ul>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">ObjectOutputStream oos = <span class="keyword">new</span> ObjectOutputStream(<span class="keyword">new</span> FileOutputStream(<span class="string">&quot;template&quot;</span>));</span><br><span class="line">oos.writeObject(obj);</span><br><span class="line">(Person)oos.readObject();</span><br></pre></td></tr></table></figure>

<ul>
<li><p>**实现<a target="_blank" rel="noopener" href="https://blog.csdn.net/yaomingyang/article/details/79321939">Externalizable**</a></p>
<p>必须实现writeExternal、readExternal方法。</p>
</li>
</ul>
<h2 id="泛型"><a href="#泛型" class="headerlink" title="泛型"></a>泛型</h2><p>如果用object类型作为容器的接受，接受所有数据。这样取回来需要强制类型转化。</p>
<h4 id="1-泛型类和泛型接口"><a href="#1-泛型类和泛型接口" class="headerlink" title="1. 泛型类和泛型接口"></a>1. 泛型类和泛型接口</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">Demo</span>&lt;<span class="title">T</span>&gt;</span>&#123;&#125;</span><br><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">interface</span> <span class="title">Demo</span>&lt;<span class="title">T</span>&gt;</span>&#123;&#125;</span><br></pre></td></tr></table></figure>

<ul>
<li>泛型类，<strong>创建对象时指定参数类型。</strong></li>
</ul>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">List&lt;Integer&gt; list = <span class="keyword">new</span> ArrayList&lt;Integer&gt;</span><br></pre></td></tr></table></figure>

<ul>
<li>泛型接口</li>
</ul>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 用泛型接口创建普通类，在类编写时指定参数类型，编写借口的方法全设为T，比较少用</span></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">EmployeeDao</span> <span class="keyword">implements</span> <span class="title">baseDao</span>&lt;<span class="title">Employee</span>&gt;</span>&#123;</span><br><span class="line">  	接口中的方法中的参数全变成了Employee</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">// 用泛型接口创建泛型类，在创建对象时指定类型</span></span><br><span class="line"><span class="class"><span class="keyword">class</span> <span class="title">Demo</span>&lt;<span class="title">T</span>&gt; <span class="keyword">implements</span> <span class="title">Generator</span>&lt;<span class="title">T</span>&gt; </span>&#123;&#125;</span><br></pre></td></tr></table></figure>


<h4 id="2-泛型方法"><a href="#2-泛型方法" class="headerlink" title="2. 泛型方法"></a>2. 泛型方法</h4><p>方法中使用泛型不一定是泛型方法，<strong>只有在方法访问权限和返回值中间加入泛型声明，此方法成为泛型方法</strong>。一般是static方法</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">public</span> <span class="keyword">static</span> &lt;T extents Serialize&gt; <span class="function">t <span class="title">out</span><span class="params">(Class&lt;T&gt;)</span></span>&#123;&#125;</span><br></pre></td></tr></table></figure>

<h4 id="3-泛型通配符？"><a href="#3-泛型通配符？" class="headerlink" title="3. 泛型通配符？"></a>3. 泛型通配符？</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">List&lt;?&gt; list;</span><br><span class="line"><span class="keyword">public</span> <span class="keyword">void</span> out（Info&lt;?&gt; info）&#123;&#125;   	表示可以传入任何类型的Info泛型类</span><br><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">out</span><span class="params">(Demo&lt;? extents Math&gt;)</span> 		传入Demo泛型对象必须是Math的子类          </span></span><br></pre></td></tr></table></figure>

<h4 id="4-泛型上下界"><a href="#4-泛型上下界" class="headerlink" title="4. 泛型上下界"></a>4. 泛型上下界</h4><p>可以在<strong>泛型声明中加入extends</strong>，来规定能够使用类型的上界：代表的传入的泛型类型只能是这个类或者这个类的子类。<strong>super关键字</strong>则是传入当前类或当前类的父类</p>

<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">out</span><span class="params">(Demo&lt;? extents Math&gt;)</span> 		传入Demo泛型对象必须是Math的子类   </span></span><br><span class="line"><span class="function"><span class="keyword">public</span> class Demo&lt;T extents Math&gt;</span>&#123; &#125;	这个泛型类只能指定Math的子类类型</span><br><span class="line"><span class="keyword">public</span> &lt;T extents Math&gt; <span class="function"><span class="keyword">void</span> <span class="title">out</span><span class="params">(T t)</span></span>&#123;&#125;   这个泛型方法</span><br></pre></td></tr></table></figure>

<h1 id="集合"><a href="#集合" class="headerlink" title="集合"></a>集合</h1><p><a target="_blank" rel="noopener" href="https://juejin.im/post/5e18879e6fb9a02fc63602e2#heading-3">常问基础题</a></p>
<ul>
<li>Iterator迭代器</li>
</ul>
<p>是Collection类的父接口，容器对象通过iterator方法获取自身的迭代器，用于取出自身的元素。<a target="_blank" rel="noopener" href="https://blog.csdn.net/qq_29631809/article/details/72599708">集合数据结构</a></p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">Iterator&lt;String&gt; iterator = list.iterator();</span><br><span class="line"><span class="keyword">while</span>(iterator.hasNext())&#123;</span><br><span class="line">  System.out.println(iterator.next(););</span><br><span class="line">  it.remove();</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h2 id="List接口"><a href="#List接口" class="headerlink" title="List接口"></a>List接口</h2><p>add，set(int)，get(int)，remove(int)，contains(obj)</p>
<p>（有序可重复）元素按照索引有序排列，元素值可以重复，<strong>按照索引取值</strong></p>
<ul>
<li>对于contains方法，对list的每一个元素调用了equals(obj)，如果是对象，需要重写equals方法才能生效。比如我们经常验证id相等就算作同一对象。字符串也有contains方法</li>
</ul>
<h4 id="1-ArrayList"><a href="#1-ArrayList" class="headerlink" title="1. ArrayList"></a><strong>1. ArrayList</strong></h4><p>因为<a target="_blank" rel="noopener" href="https://blog.csdn.net/zxt0601/article/details/77281231">底层</a>采用数组，所以在开头或者中间位置插入或删除数据，后面元素位置都要移动，<strong>增删慢</strong>。<a target="_blank" rel="noopener" href="https://blog.csdn.net/u012859681/article/details/78206494">线程不安全</a><br>数组决定了ArrayList随机读取快，<strong>查询快或者说遍历快</strong>，JDK 8将ArrayList的初始创建长度，由10该到了0，创建List更快。</p>
<p>list允许元素为null。Vector（Stack是Vector的一个FIFO栈子类）到JCL中的CopyOnWriteArrayList</p>
<p><a target="_blank" rel="noopener" href="https://blog.csdn.net/top_code/article/details/8650910">直接用LinkedList构建链栈</a></p>
<p>可以用LinkedList来模拟栈（先进后出）和队列（先进先出）</p>
<h4 id="2-LinkedList（双向链表实现）："><a href="#2-LinkedList（双向链表实现）：" class="headerlink" title="2. LinkedList（双向链表实现）："></a>2. LinkedList（双向链表实现）：</h4><p>底层采用双向链表（可以用queue），所以插入和删除数据，其他元素都不会变化，时间复杂度永远是O(1)</p>
<p>插入删除块，读区遍历慢。</p>
<ul>
<li><p>LinkedList的add/remove就是一个队列。add/offer入栈，remove/pool出栈（removeFirst）</p>
<p>peek取头部节点，push/pop相当FIFO栈</p>
<p>Queue<String> queue = new LinkedList<String>()</p>
</li>
</ul>
<h2 id="Set接口"><a href="#Set接口" class="headerlink" title="Set接口"></a>Set接口</h2><p>add，contains，remove，set集合不能根据索引获取值，只能利用迭代器迭代所有数据</p>
<h4 id="HashSet"><a href="#HashSet" class="headerlink" title="HashSet"></a><strong>HashSet</strong></h4><p>HashSet底层基于HashMap，存储形式为哈希表，重写hashCode和equals：大体根据hashCode值和数组的长度进行计算出存储的下标；如果下标的位置无元素，那么直接存储；如果有元素，那么使用要存入的元素和该元素进行equals方法，如果结果为真，则已经有相同的元素了，<strong>直接不存（HashMapKey不变，覆盖value）</strong>；如果不相等，那么进行存储，以链表的形式存储。</p>
<ul>
<li>重写equals方法。先判断内存地址，在判断属于的类，再比较属性的值。</li>
<li>重写hashcode()方法：this.name.hashcode()</li>
</ul>
<h4 id="TreeSet"><a href="#TreeSet" class="headerlink" title="TreeSet"></a>TreeSet</h4><p>TreeSet基于TreeMap，存储形式为二叉树，适合大量数据的存储，30几层就10亿数据多了，<strong>必须继承Comparable接口，重写compareTo方法</strong>，否则第二次插入直接报错。</p>
<p>add方法调用TreeMap的put（key，PRESENT），存到Entry&lt;k,v&gt;(key,value,parent)，第一个parent为null，这个节点就成为根。<strong>对象所属的类需要实现Comparable接口，或者给TreeSet集合传递一个Comparator接口对象</strong>。</p>
<h2 id="Map接口"><a href="#Map接口" class="headerlink" title="Map接口"></a>Map接口</h2><p>put（key，value），get(key)，containsKey，containsValue，remove，entrySet</p>
<p>get(“key”)==null也可以实现containsKey的效果。如果<strong>插入重复的key，key值保持原来的，value将会覆盖</strong></p>
<h4 id="HashMap"><a href="#HashMap" class="headerlink" title="HashMap"></a>HashMap</h4><p>基于哈希表实现，对象作为键时，必须在对象类中重写hasCode和equals方法。</p>
<p>JDK 8当调用put方法时才将数组长度初始化为16；链表长度大于8，数组长度大于64时，此个索引位置全部使用红黑树进行存储</p>
<p><a target="_blank" rel="noopener" href="https://blog.csdn.net/zdb292034/article/details/80665364?depth_1-utm_source=distribute.pc_relevant.none-task-blog-BlogCommendFromBaidu-1&utm_source=distribute.pc_relevant.none-task-blog-BlogCommendFromBaidu-1">遍历map</a>的方法：（Map基本不用来遍历）转化成set，然后用set的for或者迭代器遍历</p>

<ul>
<li><p>HashTable（淘汰，<a target="_blank" rel="noopener" href="https://zhuanlan.zhihu.com/p/31614308">ConcurrentHashMap</a>替代）：是HashMap的线程安全类，不允许null key（hashmap允许）。</p>
<p>HashMap多个线程同时put的时候会线程不安全，给每个Segment上锁，size()方法，所有segment的元素加起来，所有segment的修改次数加起来</p>
<p>ConcrrentHashMap用了Segment，将HashMap分块，降低了锁的粒度</p>
</li>
<li><p>LinkedHashMap是HashMap子类，底层用链表代替HashMap的数组，相比HashMap迭代更慢（插入也稍慢），但是因为是链表，插入顺序得以保存，输出顺序和输入顺序相同</p>
</li>
</ul>

<h4 id="二叉树存储"><a href="#二叉树存储" class="headerlink" title="二叉树存储"></a>二叉树存储</h4><p>降低查找的复杂度，有序（排列有序，升序）。</p>
<p>第一个元素，那么直接存入，作为根节点，下一个元素通过compareTo的返回值（返回值为0时，底层认为相同元素），在底层决定往左右哪边查找，正数向节点的右边查找，负数向节点左边超招，等于节点就不存储。直到有他的位置存储为止</p>
<ul>
<li><p>第一次put，判断根是否为空，为空，将第一个元素存为根节点</p>
</li>
<li><p>第二次，造型（向上转型）成Comparable，设置parent = t那个entry，执行K.compareTo(root.key)</p>
<p>每一个Treeset里的元素调用CompareTo方法与obj比较，比obj大，返回正数（TreeSet底层再把比较元素放到obj前面），比obj小，返回-1。</p>
</li>
</ul>
<p><strong>完全二叉树</strong>：只有h-1可以度小于2，h-1如果有叶，在最左边、满二叉树：一共有2^n-1个节点。</p>
<p><strong>红黑树</strong>：根是黑，叶是黑，红相连的两个节点是黑，任何一个节点到叶子经过的黑色节点相同。满足这个性质，左右子树会非常平衡</p>
<p><strong><a target="_blank" rel="noopener" href="https://www.jianshu.com/p/fc5e16b5c674">TreeSet算法：</a></strong></p>
<p>实现了Map.Entry，boolean color = black；</p>
<p>新插入的节点永远是红色，看父节点是不是黑色，如果黑，左旋</p>
<p>比较器排序：额外自定义一个类实现Comparetor接口&lt;对象泛型&gt;，重写compare方法，然后在创建 TreeSet 的时`候，把比较器对象作为参数传递给 TreeSet。</p>
