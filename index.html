<h1 id="多线程"><a href="#多线程" class="headerlink" title="多线程"></a>多线程</h1><p>Java程序至少有两个线程：主线程和垃圾回收线程。netty学习</p>
<p><a target="_blank" rel="noopener" href="https://www.zhihu.com/question/56494969">线程六种状态</a></p>
<h4 id="Java实现多线程的三种方式"><a href="#Java实现多线程的三种方式" class="headerlink" title="Java实现多线程的三种方式"></a>Java实现多线程的三种方式</h4><ol>
<li>继承Thread类</li>
</ol>
<p>继承Thread，重写run方法，通过构造方法将要并发处理的资源传入线程类。调用start方法，就用一个线程执行run()线程体。</p>
<p>Thread的Name属性是默认分配的线程编号（可setName <strong>Thread.currentThread( )</strong>.getName）</p>
<p>线程局部变量<a target="_blank" rel="noopener" href="https://juejin.im/post/5ac2eb52518825555e5e06ee#comment">ThreadLocal</a>，是一个map</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">ThreadLocal&lt;Connection&gt; threadLocal = <span class="keyword">new</span> ThreadLocal&lt;&gt;();</span><br><span class="line"><span class="comment">// 在run方法体中产生了一个connection，set以后，线程再次用get就可以获取到</span></span><br><span class="line">threadLocal.set(connection);</span><br><span class="line">threadLocal.get()</span><br></pre></td></tr></table></figure>

<ol start="2">
<li>实现runnable接口/Callable接口</li>
</ol>
<p>用一个类实现runnable接口，实现run方法。用Thread类接收Runnable接口的实现类，调用start方法。</p>
<p>JDK1.5增加了Callable接口。主要是call()方法代替run()方法，call()任务可返回值、可以抛出异常，不可用Thread类接受并start，可以用线程池excute。</p>
<ol start="3">
<li>线程池</li>
</ol>
<p>数据库连接池（数据连接是最好时间的），线程池（操作系统）。</p>
<ul>
<li>避免线程的创建和销毁带来的开销</li>
<li>避免大量线程抢占带来资源的阻塞（设定固定线程）</li>
<li>对线程提供简单的定时和间隔执行</li>
</ul>
<p>匿名类只能调用外部类的常量（final）</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 动态扩展线程池，不够就新建进程</span></span><br><span class="line">ExecutorService ThreadPool = Executors.newCacheThreadPool();</span><br><span class="line"><span class="comment">// 定长线程池</span></span><br><span class="line">ExecutorService ThreadPoo2 = Executors.newfixedThreadPool(<span class="number">5</span>);</span><br><span class="line"><span class="comment">// 定时线程池（定长）</span></span><br><span class="line">ExecutorService ThreadPoo3 = Executors.newSingleThreadExecutor();</span><br><span class="line"><span class="comment">// 创建线程，同时只能一个线程,里面要求一个Runnable的实现类（Callable），或者一个匿名实现类，不用start。</span></span><br><span class="line">ThreadPool.excute(<span class="keyword">new</span> Runnable()&#123;&#125;)</span><br><span class="line">  </span><br><span class="line"><span class="comment">// 定长且定时</span></span><br><span class="line">ScheduleThreadPool ThreadPool3 = newScheduleThreadPool(<span class="number">5</span>);</span><br><span class="line">schedule(<span class="keyword">new</span> Runnable(),<span class="number">3</span>,TimeUnit,SECONDS)：延迟<span class="number">3</span>秒，执行一次  </span><br><span class="line">scheduleAtFixedRate(<span class="keyword">new</span> Runnable(),<span class="number">1</span>,<span class="number">3</span>，TimeUnit,SECONDS)：延迟<span class="number">1</span>秒，没<span class="number">3</span>秒执行一次</span><br><span class="line">pool.shchedule()</span><br><span class="line"><span class="comment">// 执行完以后就放回线程池</span></span><br></pre></td></tr></table></figure>

<h4 id="synchronized"><a href="#synchronized" class="headerlink" title="synchronized"></a>synchronized</h4><p><a target="_blank" rel="noopener" href="https://tech.meituan.com/2018/11/15/java-lock.html">Java锁机制</a></p>
<ul>
<li><p>锁方法（同步方法）：获取了当前对象锁。静态方法+这个关键字，会拿到当前类的类锁</p>
</li>
<li><p>锁块（同步代码块）：synchronized(对象){   }，表示这里是对象的锁，拿到相同的锁的两个线程之间就会互斥</p>
</li>
</ul>
<h4 id="线程对象方法："><a href="#线程对象方法：" class="headerlink" title="线程对象方法："></a>线程对象方法：</h4><p>下面两个方法是Thread中的方法</p>
<ol>
<li>**线程对象.start()**：方法通知CPU开启新线程方式并启动run方法，并不会占用所有资源</li>
<li><strong>线程对象.join()**：强制执行（等强制执行此线程后才执行其他线程，理解成</strong>插队**），其他线程进入挂起状态</li>
</ol>
<h4 id="在并发方法中使用的方法："><a href="#在并发方法中使用的方法：" class="headerlink" title="在并发方法中使用的方法："></a>在并发方法中使用的方法：</h4><ul>
<li><p><strong>Thread.sleep(毫秒)</strong> ：静态方法，直接写在run方法中，线程休眠，但是不丢失锁（监视器）的所属权</p>
</li>
<li><p><strong>this.wait(毫秒)**：</strong>必须要拿到调用方法对象的内置锁<strong>（对象监视器），才能使用wait方法，也就是方法必须加synchronized关键字或者用锁块，让资源拥有者判断让哪个线程休眠，谁拿到锁。</strong>休眠时会释放锁**，也需要</p>
</li>
<li><p><strong>this.notify()、this.notifyAll</strong>：拿到锁后（run方法调用仓库的notify），随机唤醒一个休闲线程</p>
</li>
</ul>
<h4 id="小问题"><a href="#小问题" class="headerlink" title="小问题"></a>小问题</h4><p>如果synchronized可以对个两个方法内的一段的互斥，</p>
<p>假设A里有1，2，3三个代码块，B里有4，5，6三个代码块，要求A方法能的2要互斥，B方法的4，5要互斥，但要求2，34能并发。可以拿不同的对象锁</p>
<h4 id="可编程式锁（1-5，ReentrantLock）"><a href="#可编程式锁（1-5，ReentrantLock）" class="headerlink" title="可编程式锁（1.5，ReentrantLock）"></a>可编程式锁（1.5，ReentrantLock）</h4><p>Lock是一个接口。比Synchronized更加灵活，不能用了this.wait()。</p>
<p>Lock lock = new ReentrantLock()，官方推荐搭配try-finally，在finally写unlock释放锁</p>
<h4 id="读锁（共享锁）写锁（排他锁）"><a href="#读锁（共享锁）写锁（排他锁）" class="headerlink" title="读锁（共享锁）写锁（排他锁）"></a>读锁（共享锁）写锁（排他锁）</h4><p>Lock lock = new ReentrantLockReedWriteLock()，</p>
<p>ReadLock readLock = lock.readLock();</p>
<p><strong>atomic</strong> </p>
<p>mutex互斥量和semaphore信号量，semaphore等于1时可以做到mutex</p>

          <h1 id="Mybatis"><a href="#Mybatis" class="headerlink" title="Mybatis"></a>Mybatis</h1><p><a target="_blank" rel="noopener" href="https://blog.csdn.net/majinggogogo/article/details/72179560">mybatis原理</a></p>
<p>mybatis是一个<strong>封装了原生JDBC的框架</strong>，是一种ORM框架：Object Relational Mapping(对象关系映射)</p>
<h2 id="mybatis的配置"><a href="#mybatis的配置" class="headerlink" title="mybatis的配置"></a>mybatis的配置</h2><p>类中 加载mybatis主配置文件，执行sql语句：</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//1. 加载主配置文件到内存中，放到src下</span></span><br><span class="line">Reader reader=Resources.getResourceAsReader(<span class="string">&quot;mybatis-config.xml&quot;</span>); </span><br><span class="line"><span class="comment">//2. 生成SqlSessionFactory对象</span></span><br><span class="line">SqlSessionFactory factory = <span class="keyword">new</span> SqlSessionFactoryBuilder().build(reader); </span><br><span class="line"><span class="comment">//3. 利用sqlsessionFactory生成sqlsession</span></span><br><span class="line">SqlSession sqlSession = factory.openSession(); </span><br><span class="line"><span class="comment">//4. &quot;命名空间.ID&quot;指定执行哪个insert，然后才插入具体数据</span></span><br><span class="line">sqlSession.insert(<span class="string">&quot;Employee.insert&quot;</span>, e); </span><br></pre></td></tr></table></figure>

<ol>
<li><p>原始编写dao类，如上</p>
</li>
<li><p>Mapper与接口绑定生成dao类</p>
<p>代理模式创建dao，namespace写成对应接口的全路径，并且id对应的方法，原理代理模式，mybatis框架自动创建代理对象：EmpDao empDao = sqlSession.getmapper(EmpMapperImpl.class)生成代理对象。            </p>
</li>
</ol>
<h2 id="ResultMap"><a href="#ResultMap" class="headerlink" title="ResultMap"></a>ResultMap</h2><h4 id="resultType和resultMap："><a href="#resultType和resultMap：" class="headerlink" title="resultType和resultMap："></a>resultType和<a target="_blank" rel="noopener" href="https://www.cnblogs.com/nick-guo-sdly/p/7668462.html">resultMap</a>：</h4><p>select方法取到的结果集可以直接被映射，两种形式resultType和resultMap。</p>
<ul>
<li><p>resultType不需要手动设置标签映射，当查询的数据库中列名和resultType指定类的属性名相同自动完成的映射。</p>
<p>而且两<strong>个类型会自动匹配</strong>，JavaType=”Data”，jdbcType=”Data”，</p>
</li>
<li><p>resultMap是自定义的映射，定义了类中的属性（property）和结果集中的列名（column）的映射关系。当PO对象需要映射多个对象时，可以使用association和collection</p>
</li>
</ul>
<h4 id="一对一关联association"><a href="#一对一关联association" class="headerlink" title="一对一关联association"></a>一对一关联association</h4><p>对象一对一依赖</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">resultMap</span> <span class="attr">id</span>=<span class="string">&quot;employeeMap&quot;</span> <span class="attr">type</span>=<span class="string">&quot;com.lee.Emp&quot;</span>&gt;</span></span><br><span class="line">  <span class="comment">&lt;!-- 1. 通过左外连接，连接子表的结果返回到这个association的resultMap里。</span></span><br><span class="line"><span class="comment">  如果返回的结果用association中用自定义的映射代替resultMap，association要带一个javaType属性，代表属性类型--&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">association</span> <span class="attr">property</span>=<span class="string">&quot;dept&quot;</span> <span class="attr">resultMap</span>=<span class="string">&quot;Departments.deptMap&quot;</span>/&gt;</span></span><br><span class="line">  <span class="comment">&lt;!-- 2. 通过嵌套查询，将查询的结果返回到这个里面来 --&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">association</span> <span class="attr">property</span>=<span class="string">&quot;dept&quot;</span> <span class="attr">column</span>=<span class="string">&quot;department_id&quot;</span> <span class="attr">select</span>=<span class="string">&quot;Departments.selectById&quot;</span>/&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">resultMap</span>&gt;</span></span><br></pre></td></tr></table></figure>

<h4 id="一对多关联Collection"><a href="#一对多关联Collection" class="headerlink" title="一对多关联Collection"></a>一对多关联Collection</h4><p> 对象一对多依赖</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">&lt;!-- 1. 需要在collection里指定resultMap（可以自定义）和ofType，接受左外连接传来的数据</span></span><br><span class="line"><span class="comment">				使用连接查询，里面不能使用分页，否则collection里数据截断。</span></span><br><span class="line"><span class="comment">				默认javatype是List，可省略List</span></span><br><span class="line"><span class="comment">				如果ResultMap的type写util.Map(很少)的话，此时必须指定collection的JavaType--&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">resultMap</span> <span class="attr">type</span>=<span class="string">&quot;com.test.mybatis.model.RoleInfo&quot;</span> <span class="attr">id</span>=<span class="string">&quot;roleMap&quot;</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">id</span> <span class="attr">column</span>=<span class="string">&quot;id&quot;</span> <span class="attr">property</span>=<span class="string">&quot;roleid&quot;</span>/&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">result</span> <span class="attr">column</span>=<span class="string">&quot;name&quot;</span> <span class="attr">property</span>=<span class="string">&quot;rolename&quot;</span>/&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">collection</span> <span class="attr">property</span>=<span class="string">&quot;menulist&quot;</span> <span class="attr">ofType</span>=<span class="string">&quot;entity.Menu&quot;</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">id</span> <span class="attr">column</span>=<span class="string">&quot;menuid&quot;</span> <span class="attr">property</span>=<span class="string">&quot;id&quot;</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">result</span> <span class="attr">column</span>=<span class="string">&quot;menuname&quot;</span> <span class="attr">property</span>=<span class="string">&quot;name&quot;</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">result</span> <span class="attr">column</span>=<span class="string">&quot;description&quot;</span> <span class="attr">property</span>=<span class="string">&quot;description&quot;</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">result</span> <span class="attr">column</span>=<span class="string">&quot;parent&quot;</span> <span class="attr">property</span>=<span class="string">&quot;parent&quot;</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">result</span> <span class="attr">column</span>=<span class="string">&quot;createdate&quot;</span> <span class="attr">property</span>=<span class="string">&quot;createdate&quot;</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">result</span> <span class="attr">column</span>=<span class="string">&quot;modifydate&quot;</span> <span class="attr">property</span>=<span class="string">&quot;modifydate&quot;</span>/&gt;</span></span><br><span class="line">  <span class="tag">&lt;/<span class="name">collection</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">resultMap</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">select</span> <span class="attr">id</span>=<span class="string">&quot;selectRole&quot;</span> <span class="attr">resultMap</span>=<span class="string">&quot;roleMap&quot;</span>&gt;</span></span><br><span class="line">  select </span><br><span class="line">  ram.roleid as id,</span><br><span class="line">  ro.name as name,</span><br><span class="line">  me.id as menuid,</span><br><span class="line">  me.name as menuname,</span><br><span class="line">  me.description,</span><br><span class="line">  me.parent,</span><br><span class="line">  me.createdate,</span><br><span class="line">  me.modifydate </span><br><span class="line">  from roleandmenu ram</span><br><span class="line">  left outer join role ro on ram.roleid=ro.id</span><br><span class="line">  left outer join menu me on ram.menuid=me.id</span><br><span class="line"><span class="tag">&lt;/<span class="name">select</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&lt;!-- 2. 使用嵌套查询，会用column指定的列，作为第二次查询的参数，在这个查询里指定resultType或者ResultMap --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">resultMap</span> <span class="attr">type</span>=<span class="string">&quot;entity.Role&quot;</span> <span class="attr">id</span>=<span class="string">&quot;roleMap&quot;</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">id</span> <span class="attr">property</span>=<span class="string">&quot;roleid&quot;</span> <span class="attr">column</span>=<span class="string">&quot;id&quot;</span>/&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">result</span> <span class="attr">property</span>=<span class="string">&quot;rolename&quot;</span> <span class="attr">column</span>=<span class="string">&quot;name&quot;</span>/&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">collection</span> <span class="attr">property</span>=<span class="string">&quot;menulist&quot;</span> <span class="attr">select</span>=<span class="string">&quot;selectMenu&quot;</span> <span class="attr">column</span>=<span class="string">&quot;id&quot;</span>/&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">resultMap</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">select</span> <span class="attr">id</span>=<span class="string">&quot;selectRole&quot;</span> <span class="attr">resultMap</span>=<span class="string">&quot;roleMap&quot;</span>&gt;</span></span><br><span class="line">  select id,name from role</span><br><span class="line"><span class="tag">&lt;/<span class="name">select</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">select</span> <span class="attr">id</span>=<span class="string">&quot;selectMenu&quot;</span> <span class="attr">resultType</span>=<span class="string">&quot;com.test.mybatis.model.Menu&quot;</span>&gt;</span></span><br><span class="line">  select m.id,m.name</span><br><span class="line">  from menu m join roleandmenu ram on m.id=ram.menuId</span><br><span class="line">  where ram.roleId=#&#123;id&#125;</span><br><span class="line"><span class="tag">&lt;/<span class="name">select</span>&gt;</span></span><br></pre></td></tr></table></figure>

<h2 id="动态SQL"><a href="#动态SQL" class="headerlink" title="动态SQL"></a>动态SQL</h2><p>在编写mybatis中的SQL可以执行动态SQL，通过条件等逻辑语句，动态生成一段SQL语句。set，where，</p>
<p><a target="_blank" rel="noopener" href="https://blog.csdn.net/mahoking/article/details/46811865">批量增删改</a></p>
<h4 id="和-的区别"><a href="#和-的区别" class="headerlink" title="#和$的区别"></a>#和$的区别</h4><p>id=#{}或者id=${}差不多，#加双引号，$不加。所以在排序时一定要使用 ${}，SELECT * FROM employee ORDER BY ${salary}。</p>
<p>另外#会有预编译阶段，$没有，容易SQL注入，可以查看这篇<a target="_blank" rel="noopener" href="https://blog.csdn.net/weixin_44739349/article/details/91039280?depth_1-utm_source=distribute.pc_relevant.none-task&utm_source=distribute.pc_relevant.none-task">博文</a></p>
<h4 id="insert元素"><a href="#insert元素" class="headerlink" title="insert元素"></a>insert元素</h4><p>mysql<a target="_blank" rel="noopener" href="https://blog.csdn.net/mytt_10566/article/details/74279105">主键自增长</a>生成：使用**useGnerateKeys=”true” keyproperty=”Employee_id”**，在SQL语句中不写自增长字段。</p>
<p>可以不用<a target="_blank" rel="noopener" href="https://blog.csdn.net/death05/article/details/53098328?depth_1-utm_source=distribute.pc_relevant.none-task-blog-BlogCommendFromMachineLearnPai2-1&utm_source=distribute.pc_relevant.none-task-blog-BlogCommendFromMachineLearnPai2-1">trim</a>，插入为空就不插入了，但是要指定jdbcType。用trim+if判断空值，不需要指定jdbcType。批量插入parameterType依然写类</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">insert</span> <span class="attr">id</span>=<span class="string">&quot;insert&quot;</span> <span class="attr">parameterType</span>=<span class="string">&quot;Dept&quot;</span> <span class="attr">useGeneratedKeys</span>=<span class="string">&quot;true&quot;</span> <span class="attr">keyProperty</span>=<span class="string">&quot;department_id&quot;</span>&gt;</span> </span><br><span class="line">  insert into departments(default, department_name) values (#&#123;department_id&#125;,#&#123;department_name&#125;) </span><br><span class="line">  // 或者insert into departments(department_name) values (#&#123;department_name, jdbcType=varchar&#125;) </span><br><span class="line"><span class="tag">&lt;/<span class="name">insert</span>&gt;</span></span><br></pre></td></tr></table></figure>

<h4 id="update元素"><a href="#update元素" class="headerlink" title="update元素"></a>update元素</h4><p>不修改的值保持原值，传入一个对象。字符串写判断是否为空字符串或null，传入对象时要带其id</p>
<p><strong>基本数据类型和对象等数据只需要判断是否为null</strong>】</p>

e">trim</span>&gt;</span> </span><br><span class="line">  where employee_id = #&#123;employee_id&#125;</span><br><span class="line"><span class="tag">&lt;/<span class="name">update</span>&gt;</span></span><br></pre></td></tr></table></figure>

an class="line"><span class="tag">&lt;/<span class="name">delete</span>&gt;</span></span><br></pre></td></tr></table></figure>

23;first_name&#125; </span><br><span class="line">      &lt;/if&gt;</span><br><span class="line">      &lt;<span class="keyword">if</span> test=<span class="string">&quot;job_id!=null and job_id!=&#x27;&#x27;&quot;</span>&gt; </span><br><span class="line">        and job_id = #&#123;job_id&#125; </span><br><span class="line">      &lt;/if&gt; </span><br><span class="line">    &lt;/trim&gt; </span><br><span class="line">		&lt;<span class="keyword">if</span> test =<span class="string">&quot;index!=null&quot;</span>&gt;</span><br><span class="line">      limit #&#123;index&#125;,#&#123;pageSize&#125;</span><br><span class="line">    &lt;/if&gt; </span><br><span class="line">  &lt;/select&gt;</span><br><span class="line">  &lt;!-- 计数--&gt;</span><br><span class="line">  &lt;select id=<span class="string">&quot;count&quot;</span> parameterType=<span class="string">&quot;java.util.Map&quot;</span> resultType=<span class="string">&quot;int&quot;</span>&gt;</span><br><span class="line">    <span class="function">select <span class="title">count</span><span class="params">(*)</span> from employee</span></span><br><span class="line"><span class="function">    &lt;where&gt;</span></span><br><span class="line"><span class="function">      &lt;<span class="keyword">if</span> test</span>=<span class="string">&quot;firstName !=null and firstname!=&#x27;&#x27; &quot;</span>&gt;</span><br><span class="line">        and first_name = # &#123;firstName&#125;</span><br><span class="line">      &lt;/if&gt;</span><br><span class="line">    &lt;/where&gt;</span><br><span class="line">  &lt;/select&gt;</span><br><span class="line">  </span><br><span class="line">&lt;/mapper&gt;</span><br></pre></td></tr></table></figure>

<h1 id="MySQL"><a href="#MySQL" class="headerlink" title="MySQL"></a>MySQL</h1><h4 id="database，schema和instance的区别"><a href="#database，schema和instance的区别" class="headerlink" title="database，schema和instance的区别"></a>database，schema和instance的区别</h4><ul>
<li>mysql中：database=schema（子集为数据库对象），两个关键字同义。</li>
<li>oracle中：一个instance对应一个database，instance指进程，database指后台进程。某个用户下的数据库对象集合称为schema（有）。oracle创建对象必须要对应一个用户，与mysql和SQLserver不一样</li>
<li>SQLserver：一个instance对应多个database。服务器.数据库.Schema.对象</li>
</ul>
<h4 id="三大数据库设计范式"><a href="#三大数据库设计范式" class="headerlink" title="三大数据库设计范式"></a>三大数据库设计范式</h4><p>1NF：列的原子性。</p>
<p>2NF：主键依赖/取消部分依赖，通过主键来确定唯一的一条记录。非主属性依赖主键</p>
<p>3NF：取消传递依赖。非主属性除了依赖主键，不互相依赖</p>
<h4 id="a-索引-index"><a href="#a-索引-index" class="headerlink" title="a. 索引(index)"></a>a. 索引(index)</h4><p>提高查询效率，为字段创建索引。索引列区分度要高，即重复行少。一次查询只能用一个索引，多个条件时，推荐建立联合索引，一个字段可以既是索引，也是联合索引。</p>
<p><a target="_blank" rel="noopener" href="https://tech.meituan.com/2014/06/30/mysql-index.html">索引优化</a>、<a target="_blank" rel="noopener" href="https://juejin.im/post/5d67702cf265da03f333664c">mysql索引</a>、<a target="_blank" rel="noopener" href="https://zhuanlan.zhihu.com/p/27700617">B+树</a></p>
<ol>
<li><p>主键索引：一个表的主键自动生成一个主键索引</p>
</li>
<li><p>普通索引</p>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">1. 在创建表的DDL语句中添加索引</span><br><span class="line">2. 用创建索引方式创建：<span class="keyword">create</span> <span class="keyword">index</span> index_employee1 <span class="keyword">on</span> employee (sal)</span><br><span class="line"><span class="number">3.</span> 修改表方式创建：<span class="keyword">ALTER</span> <span class="keyword">TABLE</span> students <span class="keyword">ADD</span> <span class="keyword">INDEX</span> idx_name_score (<span class="keyword">name</span>, score);</span><br></pre></td></tr></table></figure>


</li>
</ol>
<ol start="4">
<li><p>唯一索引：unique index代替index</p>
</li>
<li><p>全文索引：fulltext index </p>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> <span class="keyword">test</span> <span class="keyword">where</span> <span class="keyword">match</span>(全文索引名) against(<span class="string">&#x27;aaaa&#x27;</span>);</span><br></pre></td></tr></table></figure>


</li>

<h4 id="b-视图-view"><a href="#b-视图-view" class="headerlink" title="b. 视图(view)"></a>b. 视图(view)</h4><p>查询语句的别名。隔离表结构，可以控制查询粒度，安全性更高。</p>

<h4 id="c-自增长"><a href="#c-自增长" class="headerlink" title="c. 自增长"></a>c. 自增长</h4><p>MySQL中没有Oracle的序列：我们使用AUTO_INCREMENT，当insert null或者0时，会实现自增长，mybatis mapper.xml中配置使用**useGnerateKeys=”true” keyproperty=”增长值”**这两个属性，在SQL语句中使用default，或者不写这个自增长字段，实现自增长.</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line">CREATE TABLE &#96;m_function&#96; (</span><br><span class="line">  &#96;ID&#96; int NOT NULL AUTO_INCREMENT,</span><br><span class="line">  &#96;ModuleCode&#96; varchar(6) NOT NULL COMMENT &#39;模块编号&#39;,</span><br><span class="line">  &#96;UpdateUserId&#96; varchar(30) NOT NULL COMMENT &#39;修改人&#39;,</span><br><span class="line">  &#96;UpdateDate&#96; datetime NOT NULL COMMENT &#39;修改时间&#39;,</span><br><span class="line">  PRIMARY KEY (&#96;ID&#96;)</span><br><span class="line">  -- 方式一：不指定外键名称，数据库自动生成</span><br><span class="line">  foreign key (user_id) references student(id)</span><br><span class="line">  -- 方式二：指定外键名称为(FK_Name)</span><br><span class="line">  constraint FK_Name foreign key (user_id) references student(id)</span><br><span class="line">  INDEX  index_ModuleCode (ModuleCode)-----等于  KEY  index_ModuleCode (ModuleCode)</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h2 id="TCL（Transcation-Control-Language）"><a href="#TCL（Transcation-Control-Language）" class="headerlink" title="TCL（Transcation Control Language）"></a>TCL（Transcation Control Language）</h2><p>事务是一组原子性的SQL语句，在 MySQL 中只有使用了Innodb 数据库引擎才支持事务。Java中编程式事务connection/sqlsession来操作事务</p>
<h4 id="锁"><a href="#锁" class="headerlink" title="锁"></a>锁</h4><p>一次增删改，加排他锁（一般行锁）和GAP锁（间隙锁，innodb_locks_unsafe_for_binlog），并且会自动提交事务，事务完毕，才会释放锁给其他拿到。</p>
<p>乐观锁和悲观锁是一种思想，乐观锁适合读多写少，悲观锁适合写多读少。<a target="_blank" rel="noopener" href="https://juejin.im/entry/5b63d9056fb9a04fcb5b7ff9">mysql悲观锁</a>：</p>
<ul>
<li><p>行锁，拿行锁之前，数据库会自动拿到<a target="_blank" rel="noopener" href="https://www.zhihu.com/question/51513268">意象锁</a>，表级锁</p>
<p>共享锁/读锁（S锁，Shared Lock）：lock in share mode</p>
<p>排他锁/写锁（X锁，Exclusive Lock）：for update</p>
</li>
</ul>
<p>禁止/开启自动提交：<strong>SET AUTOCOMMIT=0/1</strong></p>
<p>显式的开启事务：<strong>BEGIN</strong>或者<strong>START TRANSCATION</strong>；写SQL；<strong>COMMIT</strong></p>
<p>设置保存点：<strong>SAVEPOINT 保存点名</strong>：</p>
<p>回滚：<strong>ROLLBACK</strong>：未commit前使用，回滚到事务最开始的地方。ROLLBACK TO 保存点名：可以回退到位置</p>
<p>设置隔离级别：SET session/global <strong>TRANSCATION ISSOLATION LEVEL</strong> ，</p>
<p>查看事务隔离级别：SELECT @@tx_isolation;</p>
<h4 id="四种隔离级别"><a href="#四种隔离级别" class="headerlink" title="四种隔离级别"></a>四种隔离级别</h4><p>不同隔离级别下的加锁方式是不同的。<a target="_blank" rel="noopener" href="https://tech.meituan.com/2014/08/20/innodb-lock.html">mysql事务下的锁机制(美团)</a>、<a target="_blank" rel="noopener" href="https://blog.csdn.net/lemon89/article/details/51477497">参考文2</a>、<a target="_blank" rel="noopener" href="https://dbaplus.cn/news-11-2518-1.html">数据库的锁机制</a></p>
<ul>
<li><p>READ-UNCOMMITTED：最低隔离级别</p>
<p>任何情况都不加锁，并且其他事务没有提交前就可以被读到值</p>
</li>
<li><p>READ-COMMITTED：</p>
<p>读不加锁，但其他事务增删改需要commit以后才能读到值；增删改加排他锁（条件有索引加行级锁，无索引加表级锁）</p>
</li>
<li><p>REPEATABLE-READ：Innodb默认级别，可重复读取本次事务中多次读同一个数据时，</p>
<p>普通读（MVVC快照读）不加锁，如果事务内没有增删改操作，则不会刷新读的版本</p>
<p>update /select …… for update（当前读）/delete 这些操作，进行的是当前读，然后加锁。</p>
<p>三种锁（默认都X锁）：Record行级锁、GAP间隙锁、Next-Key锁</p>
<p>唯一索引，只对记录加行锁；非唯一索引加三种锁；where &lt;、&gt;和between，只会加GAP锁；</p>
</li>
<li><p>SERIALIZABLE：串行级别</p>
<p>数据库完全使用悲观锁，读用读锁，写用写锁。</p>
</li>
</ul>
<p>脏读 ：表示一个事务能够读取另一个事务中还未提交的数据。比如，某个事务尝试插入记录 A，此时该事务还未提交，然后另一个事务尝试读取到了记录 A。</p>
<p>不可重复读 ：是指在一个事务内，多次读同一数据可能会不同，因为其他人提交。</p>
<p>幻读 ：指同一个事务内多次查询返回的结果集不一样。比如同一个事务 A 第一次查询时候有 n 条记录，但是第二次同等条件下查询却有 n+1 条记录，这就好像产生了幻觉。发生幻读的原因也是另外一个事务新增或者删除或者修改了第一个事务结果集里面的数据，同一个记录的数据内容被修改了，所有数据行的记录就变多或者变少了。</p>
<h4 id="ACID事务"><a href="#ACID事务" class="headerlink" title="ACID事务"></a>ACID事务</h4><p>原子性（要么都执行，失败回滚）、隔离性（并发事务隔离）、一致性（一个状态转化另一个状态，但数据完整性一致）、</p>
<p>持久性（事务完整，数据库改动是永久的）</p>
<h2 id="DDL（Data-Definition-Languages）：数据定义语言。"><a href="#DDL（Data-Definition-Languages）：数据定义语言。" class="headerlink" title="DDL（Data Definition Languages）：数据定义语言。"></a>DDL（Data Definition Languages）：数据定义语言。</h2><p>对数据库对象进行操作</p>
<h4 id="a-数据库和数据库对象都能用的关键字"><a href="#a-数据库和数据库对象都能用的关键字" class="headerlink" title="a. 数据库和数据库对象都能用的关键字"></a>a. 数据库和数据库对象都能用的关键字</h4><p>在unix下：</p>
<p>​    mysql的<strong>表名和数据库名区分</strong>大小写</p>
<p>​    <strong>表的别名</strong>严格任何时候区分大小写</p>
<p>​    列名，列的别名和SQL关键字在任何时候都不区分大小写</p>
<p>在windows下：任何情况都不区分大小写</p>
<p>CRUD：Create，Retrieve，Update，Delete</p>
<ul>
<li><p>创建：<strong>create</strong> database [IF NOT EXISTS] 数据库名;</p>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">create</span> <span class="keyword">table</span> demo (</span><br><span class="line">  //可以用反引号使用关键字</span><br><span class="line">   <span class="string">`runoob_id`</span> <span class="built_in">INT</span> <span class="keyword">UNSIGNED</span> AUTO_INCREMENT,</span><br><span class="line">   <span class="string">`runoob_title`</span> <span class="built_in">VARCHAR</span>(<span class="number">100</span>) <span class="keyword">NOT</span> <span class="literal">NULL</span>,</span><br><span class="line">   <span class="string">`runoob_author`</span> <span class="built_in">VARCHAR</span>(<span class="number">40</span>) <span class="keyword">NOT</span> <span class="literal">NULL</span>,</span><br><span class="line">   <span class="string">`submission_date`</span> <span class="built_in">DATE</span>,</span><br><span class="line">   PRIMARY <span class="keyword">KEY</span> ( <span class="string">`runoob_id`</span> )</span><br><span class="line">)</span><br></pre></td></tr></table></figure>
</li>
<li><p>删除：<strong>drop</strong> database 数据库名;</p>
</li>
<li><p>显示：<strong>show</strong> databases;</p>
<p>显示创建表的语句：show create table teacher  \G，</p>
</li>
<li><p>修改：<strong>alter</strong> 数据库对象关键字 对象名 modify/add//drop</p>
<p>增加一个字段：alter table teacher add [column] sex [FIRST | AFTER] vachar(2)</p>
<p>增加一个索引：**ALTER TABLE students ADD INDEX idx_score (score);**，</p>
</li>
</ul>
<p>  修改表名：alter table emp rename [TO] emp1;</p>
<p>面向表的两个关键字：</p>
<ul>
<li>查看表定义的结构：<strong>desc</strong> 表名;</li>
<li>清空表结构：<strong>truncate</strong> table name</li>
</ul>
<p><strong>添加外键：alter table 表名 add [constraint fk_name ] foreign key(列名) references 引用表(列名)；</strong></p>
<p><strong>删除外键：ALTER TABLE Orders DROP FOREIGN KEY fk_PerOrders</strong></p>
<h2 id="DML（Data-Manipulation-Language）：数据操作语言"><a href="#DML（Data-Manipulation-Language）：数据操作语言" class="headerlink" title="DML（Data Manipulation Language）：数据操作语言"></a>DML（Data Manipulation Language）：数据操作语言</h2><p>面向数据操作的语言，增删改查四大基础语句：</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">增：insert into 表名 values()，insert into 表名 () values().</span><br><span class="line">改：update 表名 set ... where</span><br><span class="line">删：delete from 表名		&#x2F;&#x2F;truncate不能事务回滚，delete可以</span><br><span class="line">查：select ... from 表名(内联查询，外联查询)</span><br></pre></td></tr></table></figure>

<h4 id="where条件查询"><a href="#where条件查询" class="headerlink" title="where条件查询"></a>where条件查询</h4><p>=、between 10 and 20、in (5,10,15)、<strong>score is null、score is not null</strong></p>
<p>and和or</p>
<p>distinct：必须在select的所有字段前，只能返回作用字段，表示去除重复的数据。</p>
<p>as：对查询的的列名或者表名起别名。可以省略as</p>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">SELECT</span> ModuleName <span class="keyword">FROM</span> intelagr.m_function <span class="keyword">group</span> <span class="keyword">by</span> ModuleName;</span><br><span class="line"><span class="keyword">SELECT</span> <span class="keyword">distinct</span> ModuleName <span class="keyword">FROM</span> intelagr.m_function;  </span><br></pre></td></tr></table></figure>

<p>like ‘s%t’ ：以s开头，t结尾。%通配符匹配所有，_通配符只匹配一个字符，\转义</p>
<h4 id="排序和分组"><a href="#排序和分组" class="headerlink" title="排序和分组"></a>排序和分组</h4><p>先where ，再group，再having，order by要放在最后（having后面）。</p>
<p>where是对数据库中的数据筛选，having是对聚合后的结果筛选，工资大于3000的员工要用where，平均工资大于3000的部门此时要用having。<a target="_blank" rel="noopener" href="https://blog.csdn.net/qmhball/article/details/7941638">having和where的区别</a></p>
<ul>
<li><p>排序查询：order by 列名1，列名2，默认asc升序，后面加desc倒序、可以多个列名</p>
</li>
<li><p>分组查询：group by 列名，将整个表划分成若干子集查询，必须要聚合函数（SUM,MIN/MAX,AVG,count）</p>
<p>如查询某个部门的平均工资，</p>
<p>⚠️：聚合函数可以没有group by，针对整个where后的子集。除了count，其他聚合函数会把null算作0</p>
</li>
</ul>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">&#x2F;&#x2F;查询用户评论表中，每一个用户的最后评论时间：</span><br><span class="line">select * from common where id in (select MIN(id) from common group by user_id) order by id</span><br><span class="line">&#x2F;&#x2F;查询英语科目的平均成绩（这里不用group by）</span><br><span class="line">select AVG(score) from SC where course&#x3D;&#39;英语&#39;</span><br><span class="line">&#x2F;&#x2F;两门科目大于80分的同学编号</span><br><span class="line">select sno from SC where score&gt;80 group by sno having count(cno) &gt; 2</span><br></pre></td></tr></table></figure>

<h4 id="连接查询"><a href="#连接查询" class="headerlink" title="连接查询"></a>连接查询</h4><p>​    查询的内容存在于多张表中时，使用连接查询或者子查询，但<strong>推荐使用连接查询而不是子查询，连接查询不会建立临时表，效率更高</strong>。交叉连接</p>
<p>直接用using可以剔除重复列</p>
<ol>
<li><strong>交叉连接：</strong></li>
</ol>
<p>生成两个表的笛卡尔积(第一个元素来自于A表，第二个元素来自于B表)后，在这个笛卡尔积中，用where语句约束查询。<strong>开发中不使用交叉连接，使用内连接或外连接</strong></p>
<p>不加where时，返回笛卡尔积，行数将是两个表行数的乘积</p>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> course,teacher;</span><br><span class="line">等效于：</span><br><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> course across <span class="keyword">join</span> teacher;</span><br><span class="line"><span class="comment">------------------------------------------------------------</span></span><br><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> course c,teacher t</span><br><span class="line"><span class="keyword">WHERE</span> c.tno = t.tno</span><br></pre></td></tr></table></figure>

<ol start="2">
<li><strong>内连接：</strong></li>
</ol>
<p>内连接使用A表的第一条记录依次匹配B表的记录，有就生成有序对，无就跳过，开始用第二条记录匹配。</p>
<p><strong>内连接可以用on/where加条件，不加on/where时，返回笛卡尔积</strong></p>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> course c <span class="keyword">inner</span> <span class="keyword">join</span> teacher t</span><br><span class="line"><span class="keyword">on</span> c.tno = t.tno;</span><br><span class="line">等同于：</span><br><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> course <span class="keyword">inner</span> <span class="keyword">join</span> teacher</span><br><span class="line"><span class="keyword">using</span>(tno);</span><br></pre></td></tr></table></figure>

<ol start="3">
<li><strong>外连接</strong></li>
</ol>
<p>左外链接会显示一个左表的所有数据，右表是辅表，符合条件的右表记录会显示，不符合条件的右表记录将会用null显示。（右外连接相反）</p>
<p>左表用第一条记录依次匹配右表记录，如果再右表中匹配到多条记录，则生成有序对。<strong>如果没匹配到一条记录右表记录，这条左表记录依然会显示，右表用null表示，这是外连接和内连接的唯一区别</strong></p>
<p><strong>外连接必须用on加条件</strong>，可以再通过where语句来加筛选条件</p>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> course c <span class="keyword">left</span> <span class="keyword">outer</span> <span class="keyword">join</span> teacher t</span><br><span class="line"><span class="keyword">on</span> c.tno = t.tno </span><br></pre></td></tr></table></figure>

<ol start="4">
<li><strong>自连接</strong></li>
</ol>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">select</span> t.tname,tm.tname <span class="keyword">from</span> teacher t <span class="keyword">left</span> <span class="keyword">outer</span> <span class="keyword">join</span> teacher tm</span><br><span class="line"><span class="keyword">on</span> t.head = tm.tno</span><br></pre></td></tr></table></figure>

<h4 id="子查询"><a href="#子查询" class="headerlink" title="子查询"></a>子查询</h4><p>在查询语句中有使用了另一个查询的结果。</p>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> score </span><br><span class="line"><span class="keyword">where</span> degree = (<span class="keyword">select</span> degree <span class="keyword">from</span> score <span class="keyword">where</span> sno = <span class="number">109</span> <span class="keyword">and</span> cno = <span class="string">&#x27;3-105&#x27;</span>) </span><br><span class="line"><span class="keyword">and</span> sno &lt;&gt; <span class="number">109</span></span><br></pre></td></tr></table></figure>

<p>子查询几乎可以解决所有的查询需求，但是效率低。因为每执行一次外层查询就会执行子查询，子查询根据结果的数量，分为单行子查询和多行子查询</p>
<p><a target="_blank" rel="noopener" href="https://blog.csdn.net/baidu_37107022/article/details/77278381">（ = 或 &lt;&gt;  或 &gt;   &lt;  &gt;=  &lt;=）、in、exist区别</a></p>
<ul>
<li><p>= ‘name’ 只能用于一个结果，in(name1,name2) 能用于多个结果</p>
</li>
<li><p><a target="_blank" rel="noopener" href="https://blog.csdn.net/baidu_37107022/article/details/77278381">in和exist的区别</a></p>
<p>子查询小的用in，子查询大的用exist</p>
</li>
</ul>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> A <span class="keyword">where</span> cc <span class="keyword">in</span>(<span class="keyword">select</span> cc <span class="keyword">from</span> B)</span><br><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> A <span class="keyword">where</span> <span class="keyword">exists</span>(<span class="keyword">select</span> cc <span class="keyword">from</span> B <span class="keyword">where</span> cc=A.cc)</span><br></pre></td></tr></table></figure>

<p>any 任意一个</p>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> score </span><br><span class="line"><span class="keyword">where</span> degree &gt; <span class="keyword">any</span> (<span class="keyword">select</span> degree <span class="keyword">from</span> score <span class="keyword">where</span> sno = <span class="number">105</span>) </span><br></pre></td></tr></table></figure>

<p>all 所有的</p>
<figure class="highlight sql"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">select</span> * <span class="keyword">from</span> score </span><br><span class="line"><span class="keyword">where</span> degree &gt; <span class="keyword">all</span> (<span class="keyword">select</span> degree <span class="keyword">from</span> score <span class="keyword">where</span> sno = <span class="number">105</span>) </span><br></pre></td></tr></table></figure>

<h4 id="集合查询"><a href="#集合查询" class="headerlink" title="集合查询"></a>集合查询</h4><ul>
<li><p>交(intersect)，查询交叉部分</p>
</li>
<li><p>差(minus)，前面查询结果减去后面查询结果 </p>
</li>
<li><p>并( union [all] )，两个查询结果合在一起, all不剔重</p>
<p>union /union all联合查询  : 两个查询的结果 列的数量一致   union去掉重复的记录  union all显示所有记录</p>
</li>
<li><p>in子句和exist自居，in谓词缓存子查询，然后遍历， exist缓存后遍历到相同停止</p>
</li>
<li><p>select * from dept where deptno in (select distinct deptno from emp);</p>
<p>select * from dept d where exists (select deptno from emp  );</p>
</li>
</ul>
<h4 id="Mysql函数"><a href="#Mysql函数" class="headerlink" title="Mysql函数"></a>Mysql<a target="_blank" rel="noopener" href="https://www.cnblogs.com/QianChia/p/9204954.html#autoid-2-0-0">函数</a></h4><h2 id="DCL（Data-Control-Language）：数据控制语言"><a href="#DCL（Data-Control-Language）：数据控制语言" class="headerlink" title="DCL（Data Control Language）：数据控制语言"></a>DCL（Data Control Language）：数据控制语言</h2><p>对访问权限的控制</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">show user;</span><br><span class="line">select  * from all_users;</span><br><span class="line">sys：系统管理员账号，可以启动关闭数据库，管理数据库(sysdba与sysoper权限)</span><br><span class="line">system：数据库管理员账号，可以操作所有的数据库中的表（有DBA角色）</span><br><span class="line">创建账号：create user 账号名 identified by 密码</span><br><span class="line">修改密码：alter user 账号名 identified by 密码</span><br><span class="line">删除账号：drop user 账号名</span><br><span class="line">账号授权：grant 权限或角色  to 账号名		权限例如create session&#x2F;table </span><br><span class="line">解除权限：revoke 权限或角色 from 用户</span><br></pre></td></tr></table></figure>

<h1 id="原生JDBC"><a href="#原生JDBC" class="headerlink" title="原生JDBC"></a>原生JDBC</h1><p>JDBC(java database connection)是一组Java用来连接数据库的接口，每一个数据库厂商一般会提供对于Java的JDBC实现（一个jar包），如Connector/J是MySQL公司对于JDBC实现。</p>
<h2 id="JDBC连接过程"><a href="#JDBC连接过程" class="headerlink" title="JDBC连接过程"></a>JDBC连接过程</h2><p>JDBC操作数据库的增删改查都是过Statement对象的**excuteQuery(“查”), excuteUpdate(”增删改“)**。</p>
<p>查到的结果用<strong>ResultSet</strong>来接收，常用方法rs.next()，rs.getString(“列名”)，rs.getInt(“列名”)。</p>
<blockquote>
<p>必须回收数据库的游标(Cursor即数据缓冲区，有游标才能执行SQL语句、Statement、连接 (Connection)，即关流</p>
</blockquote>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br></pre></td><td class="code"><pre><span class="line"><span class="function"><span class="keyword">private</span> <span class="keyword">static</span> String <span class="title">match</span><span class="params">(String usrname, <span class="keyword">int</span> passwd)</span></span>&#123;</span><br><span class="line"></span><br><span class="line">  Connection conn =<span class="keyword">null</span>;</span><br><span class="line">  Statement stmt =<span class="keyword">null</span>;</span><br><span class="line">  ResultSet rs = <span class="keyword">null</span>;</span><br><span class="line">  String result= <span class="string">&quot;登录失败&quot;</span>;</span><br><span class="line">  <span class="keyword">try</span> &#123;</span><br><span class="line"></span><br><span class="line">		<span class="comment">//1. 通过反射注册加载驱动类(必须在方法里).    oracle.jdbc.driver.OracleDriver</span></span><br><span class="line">  	Class.forName(<span class="string">&quot;com.mysql.cj.jdbc.Driver&quot;</span>);</span><br><span class="line">    <span class="comment">//2. 打开链接(不同数据库链接字串不一样)</span></span><br><span class="line">    conn= DriverManager.getConnection(<span class="string">&quot;jdbc:mysql://localhost:3306/demo&quot;</span>,<span class="string">&quot;root&quot;</span>,<span class="string">&quot;asdfghjkl&quot;</span>);</span><br><span class="line">    <span class="comment">//3. 创建状态参数</span></span><br><span class="line">    stmt = conn.createStatement();</span><br><span class="line">    <span class="comment">//4. 数据库操作。 外部数据和数据库中数据的的match时,不要查出数据库所有数据再匹配,而是根据你的已知数据搜索,在由next方法判读.</span></span><br><span class="line">    rs= stmt.executeQuery(<span class="string">&quot;select * from passwd where name=&#x27;&quot;</span>+usrname+<span class="string">&quot;&#x27; and passwd=&quot;</span>+passwd);</span><br><span class="line">    <span class="keyword">if</span> (rs.next())&#123;</span><br><span class="line">      result = <span class="string">&quot;登录成功&quot;</span>;</span><br><span class="line">    &#125;</span><br><span class="line">  &#125; <span class="keyword">catch</span> (ClassNotFoundException e) &#123;</span><br><span class="line">    e.printStackTrace();</span><br><span class="line">  &#125; <span class="keyword">catch</span> (SQLException e) &#123;</span><br><span class="line">    e.printStackTrace();</span><br><span class="line">  &#125; <span class="keyword">finally</span> &#123;</span><br><span class="line">    <span class="comment">//5. 关流。由于服务器是不断跑的,必须完整的关流,为了防止前面的各种连接不成功,所以关流得依次关流,并且为了防止如对象没有创建成功而调用关流方法,造成空指针异常,还要进行空值判断</span></span><br><span class="line">    <span class="keyword">try</span> &#123;</span><br><span class="line">      <span class="keyword">if</span>(rs!= <span class="keyword">null</span>)&#123;</span><br><span class="line">        rs.close();</span><br><span class="line">      &#125;</span><br><span class="line">    &#125; <span class="keyword">catch</span> (SQLException e) &#123;</span><br><span class="line">      e.printStackTrace();</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">try</span> &#123;</span><br><span class="line">      <span class="keyword">if</span>(stmt != <span class="keyword">null</span>)&#123;</span><br><span class="line">        stmt.close();</span><br><span class="line">      &#125;</span><br><span class="line"></span><br><span class="line">    &#125; <span class="keyword">catch</span> (SQLException e) &#123;</span><br><span class="line">      e.printStackTrace();</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="keyword">try</span> &#123;</span><br><span class="line">      <span class="keyword">if</span> (conn != <span class="keyword">null</span>)&#123;</span><br><span class="line">        conn.close();</span><br><span class="line">      &#125;</span><br><span class="line">    &#125; <span class="keyword">catch</span> (SQLException e) &#123;</span><br><span class="line">      e.printStackTrace();</span><br><span class="line">    &#125;</span><br><span class="line">  &#125;</span><br><span class="line">  <span class="keyword">return</span> result;</span><br><span class="line">&#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

    <div class="post-body" itemprop="articleBody">
          <h2 id="Spring思想"><a href="#Spring思想" class="headerlink" title="Spring思想"></a>Spring思想</h2><p>源于EJB（Enterprise JavaBean），传统JavaEE的EJB现在已被Spring家族淘汰，Spring基于IOC思想开发。是一个IoC和AOP容器框架，松耦合+少入侵。<a target="_blank" rel="noopener" href="https://zhuanlan.zhihu.com/p/66790602">Spring中设计模式</a></p>
<ul>
<li><p>IOC（Inversion of Control，控制反转）</p>
</li>
<li><p>DI（Dependency Injection，依赖注入）</p>
</li>
<li><p>AOP（Aspect Oriented Programming，面向切面编程）：鉴定权利、日志打印跟事务处理。</p>
</li>
</ul>
<h2 id="Spring-AOP"><a href="#Spring-AOP" class="headerlink" title="Spring AOP"></a>Spring AOP</h2><p>Spring AOP默认基于动态代理的，<strong>当类（切面）没有从一个接口继承而来时，会使用cglib代理</strong> 。SpringAOP是运行时进行编译生成代理类。AspectJ则是编译时织入，将切面织入到代码，没有使用代理模式</p>
<p>MenthodInterceptor是CGLIB代理。InvocationHandler接口是JDK代理，Spring本质上也是实现他们。</p>
<p>三种角色：真实对象、代理对象、角色</p>
<h4 id="AOP核心概念"><a href="#AOP核心概念" class="headerlink" title="AOP核心概念"></a>AOP核心概念</h4><p><a target="_blank" rel="noopener" href="https://blog.csdn.net/github_34889651/article/details/51321499">AOP术语参考</a></p>
<p><strong>切面（aspect）</strong>、<strong>切入点（pointcut）</strong>、<strong>通知（advice）</strong>： 、<strong>织入（weaving）</strong></p>
<p>确定切面（哪个Bean），编写通知，设置通知的切入点（方法，角色），spring帮我们完成织入，生层代理对象</p>
<p>SpringAOP依赖于AspectJ的aspectjrt和aspectjweaver两个依赖，因为我们依赖与AspectJ框架的一些注解，一般不需要使用到AspectJ AOP框架，Spring AOP足够用</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">aop:aspect-antoproxy</span>/&gt;</span></span><br></pre></td></tr></table></figure>

<p>五种通知：begin、after（无论是否方法成功或失败）、around（包含被通知方法）、after-retuning（成功）、after-throwing（在这个方法抛出异常以后执行）</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// Aspect注解标一个切面（aspect），是通知advice和切点pointcut的集合。并用Componet注解注册到容器</span></span><br><span class="line"><span class="meta">@Component</span></span><br><span class="line"><span class="meta">@Aspect</span></span><br><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">DaoAspect</span> </span>&#123;</span><br><span class="line">  <span class="comment">// 定义一个切入点，供通知引用</span></span><br><span class="line">    <span class="meta">@Pointcut(&quot;execution(public * tmall.controller.*.*Controller.*(..))&quot;)</span></span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">pointcut</span><span class="params">()</span> </span>&#123;</span><br><span class="line">    &#125;</span><br><span class="line">  </span><br><span class="line">  <span class="comment">// 直接在通知中配置切入点</span></span><br><span class="line">    <span class="meta">@Before(&quot;execution(* com.oracle.dao.*.*(..))&quot;)</span></span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">begin</span><span class="params">()</span></span>&#123;</span><br><span class="line">        System.out.println(<span class="string">&quot;开启事务&quot;</span>);</span><br><span class="line">    &#125;</span><br><span class="line">    <span class="meta">@After(&quot;execution(* com.oracle.dao.*.*(..))&quot;)</span></span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">commit</span><span class="params">()</span></span>&#123;</span><br><span class="line">        System.out.println(<span class="string">&quot;提交事务&quot;</span>);</span><br><span class="line">    &#125;</span><br><span class="line">  <span class="comment">// 这种配置切入点也可以</span></span><br><span class="line">    <span class="meta">@Around(&quot;pointcut()&quot;)</span></span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">test</span><span class="params">(ProceedingJoinPoint joinPoint)</span></span>&#123;</span><br><span class="line">        <span class="keyword">try</span> &#123;</span><br><span class="line">          <span class="comment">// 代表原方法</span></span><br><span class="line">            joinPoint.proceed();</span><br><span class="line">        &#125; <span class="keyword">catch</span> (Throwable throwable) &#123;</span><br><span class="line">            throwable.printStackTrace();</span><br><span class="line">        &#125;</span><br><span class="line">    &#125;</span><br></pre></td></tr></table></figure>

<p>xml配置切面的通知和切入点</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">aop:config</span>&gt;</span></span><br><span class="line">  <span class="comment">&lt;!-- 配置aspect切面里的切入点和通知--&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">aop:aspect</span> <span class="attr">id</span>=<span class="string">&quot;time&quot;</span> <span class="attr">ref</span>=<span class="string">&quot;timeHandler&quot;</span> <span class="attr">order</span>=<span class="string">&quot;1&quot;</span>&gt;</span></span><br><span class="line">    <span class="comment">&lt;!-- HelloWorld类下的所有方法，任意参数，..代表0个以上参数--&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">aop:pointcut</span> <span class="attr">id</span>=<span class="string">&quot;addTime&quot;</span> <span class="attr">expression</span>=<span class="string">&quot;execution(* com.xrq.aop.HelloWorld.*(..))&quot;</span> /&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">aop:before</span> <span class="attr">method</span>=<span class="string">&quot;printTime&quot;</span> <span class="attr">pointcut-ref</span>=<span class="string">&quot;addTime&quot;</span> /&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">aop:after</span> <span class="attr">method</span>=<span class="string">&quot;printTime&quot;</span> <span class="attr">pointcut-ref</span>=<span class="string">&quot;addTime&quot;</span> /&gt;</span></span><br><span class="line">  <span class="tag">&lt;/<span class="name">aop:aspect</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">aop:aspect</span> <span class="attr">id</span>=<span class="string">&quot;log&quot;</span> <span class="attr">ref</span>=<span class="string">&quot;logHandler&quot;</span> <span class="attr">order</span>=<span class="string">&quot;2&quot;</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">aop:pointcut</span> <span class="attr">id</span>=<span class="string">&quot;printLog&quot;</span> <span class="attr">expression</span>=<span class="string">&quot;execution(* com.xrq.aop.HelloWorld.*(..))&quot;</span> /&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">aop:before</span> <span class="attr">method</span>=<span class="string">&quot;LogBefore&quot;</span> <span class="attr">pointcut-ref</span>=<span class="string">&quot;printLog&quot;</span> /&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">aop:after</span> <span class="attr">method</span>=<span class="string">&quot;LogAfter&quot;</span> <span class="attr">pointcut-ref</span>=<span class="string">&quot;printLog&quot;</span> /&gt;</span></span><br><span class="line">  <span class="tag">&lt;/<span class="name">aop:aspect</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">aop:config</span>&gt;</span></span><br></pre></td></tr></table></figure>

<p>如果一类应用了多个通知，执行顺序：</p>
<p>先执行所有前置通知，再执行所有后置通知，而且顺序相反，也就是如果一个类执行了A前置通知再执行了B前置通知，执行完方法后，先执行B后置通知，在执行A的后置通知</p>
<h2 id="Spring事务"><a href="#Spring事务" class="headerlink" title="Spring事务"></a>Spring事务</h2><p>Spring中，两种事务处理</p>
<ol>
<li>编程式事务： 通过代码来处理事务，如transactionManager.commit()，代码侵入性强</li>
<li>声明式事务：通过@Transaction注解或者xml处理事务，各有优缺点</li>
</ol>
<p>配置事务管理器的Bean：</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">&lt;!-- 核心事务管理器配置到spring（依赖数据源）--&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">bean</span> <span class="attr">id</span>=<span class="string">&quot;txManager&quot;</span> <span class="attr">class</span>=<span class="string">&quot;org.springframework.jdbc.datasource.DataSourceTransactionManager&quot;</span>&gt;</span></span><br><span class="line">	<span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;dataSource&quot;</span> <span class="attr">ref</span>=<span class="string">&quot;dataSource&quot;</span>/&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">bean</span>&gt;</span>   </span><br></pre></td></tr></table></figure>

<h4 id="1-xml配置"><a href="#1-xml配置" class="headerlink" title="1. xml配置"></a>1. xml配置</h4><p>可以设置切点，注解是方法级别的，关于<a target="_blank" rel="noopener" href="https://juejin.im/post/5e6d993cf265da575b1bd4af#comment">Spring事务面试题</a></p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">&lt;!-- 事务管理器切面的设置 --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">tx:advice</span> <span class="attr">id</span>=<span class="string">&quot;txAdvice&quot;</span> <span class="attr">transaction-manager</span>=<span class="string">&quot;txManager&quot;</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">tx:attributes</span>&gt;</span></span><br><span class="line">     <span class="comment">&lt;!-- 对insert,create,update,modify,delete,remove 开头的方法进行事务管理,只要有异常就回滚，propagation定义Spring事务传播级别， --&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">tx:method</span> <span class="attr">name</span>=<span class="string">&quot;insert*&quot;</span> <span class="attr">propagation</span>=<span class="string">&quot;REQUIRED&quot;</span> <span class="attr">rollback-for</span>=<span class="string">&quot;java.lang.Throwable&quot;</span>  <span class="attr">read-only</span>=<span class="string">&quot;false&quot;</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">tx:method</span> <span class="attr">name</span>=<span class="string">&quot;add*&quot;</span> <span class="attr">propagation</span>=<span class="string">&quot;REQUIRED&quot;</span> <span class="attr">rollback-for</span>=<span class="string">&quot;java.lang.Throwable&quot;</span>  <span class="attr">read-only</span>=<span class="string">&quot;false&quot;</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">tx:method</span> <span class="attr">name</span>=<span class="string">&quot;create*&quot;</span> <span class="attr">propagation</span>=<span class="string">&quot;REQUIRED&quot;</span> <span class="attr">rollback-for</span>=<span class="string">&quot;java.lang.Throwable&quot;</span>  <span class="attr">read-only</span>=<span class="string">&quot;false&quot;</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">tx:method</span> <span class="attr">name</span>=<span class="string">&quot;update*&quot;</span> <span class="attr">propagation</span>=<span class="string">&quot;REQUIRED&quot;</span> <span class="attr">rollback-for</span>=<span class="string">&quot;java.lang.Throwable&quot;</span>  <span class="attr">read-only</span>=<span class="string">&quot;false&quot;</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">tx:method</span> <span class="attr">name</span>=<span class="string">&quot;modify*&quot;</span> <span class="attr">propagation</span>=<span class="string">&quot;REQUIRED&quot;</span> <span class="attr">rollback-for</span>=<span class="string">&quot;java.lang.Throwable&quot;</span>  <span class="attr">read-only</span>=<span class="string">&quot;false&quot;</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">tx:method</span> <span class="attr">name</span>=<span class="string">&quot;delete*&quot;</span> <span class="attr">propagation</span>=<span class="string">&quot;REQUIRED&quot;</span> <span class="attr">rollback-for</span>=<span class="string">&quot;java.lang.Throwable&quot;</span>  <span class="attr">read-only</span>=<span class="string">&quot;false&quot;</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">tx:method</span> <span class="attr">name</span>=<span class="string">&quot;remove*&quot;</span> <span class="attr">propagation</span>=<span class="string">&quot;REQUIRED&quot;</span> <span class="attr">rollback-for</span>=<span class="string">&quot;java.lang.Throwable&quot;</span> <span class="attr">read-only</span>=<span class="string">&quot;false&quot;</span>/&gt;</span></span><br><span class="line">    <span class="comment">&lt;!-- find,get,select,count开头的方法,开启只读,提高数据库访问性能 --&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">tx:method</span> <span class="attr">name</span>=<span class="string">&quot;find*&quot;</span> <span class="attr">read-only</span>=<span class="string">&quot;true&quot;</span> /&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">tx:method</span> <span class="attr">name</span>=<span class="string">&quot;get*&quot;</span> <span class="attr">read-only</span>=<span class="string">&quot;true&quot;</span> /&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">tx:method</span> <span class="attr">name</span>=<span class="string">&quot;select*&quot;</span> <span class="attr">read-only</span>=<span class="string">&quot;true&quot;</span> /&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">tx:method</span> <span class="attr">name</span>=<span class="string">&quot;count*&quot;</span> <span class="attr">read-only</span>=<span class="string">&quot;true&quot;</span> /&gt;</span></span><br><span class="line">    <span class="comment">&lt;!-- 对其他方法 使用默认的事务管理 --&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">tx:method</span> <span class="attr">name</span>=<span class="string">&quot;*&quot;</span> /&gt;</span></span><br><span class="line">	<span class="tag">&lt;/<span class="name">tx:attributes</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">tx:advice</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&lt;!-- AOP配置切面--&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">aop:config</span>&gt;</span></span><br><span class="line">  <span class="comment">&lt;!--配置切入点--&gt;</span></span><br><span class="line">	<span class="tag">&lt;<span class="name">aop:pointcut</span> <span class="attr">id</span>=<span class="string">&quot;customerServiceOperation&quot;</span> <span class="attr">expression</span>=<span class="string">&quot;execution(* com.oracle.service.*ServiceImpl.*(..))&quot;</span> /&gt;</span></span><br><span class="line">  <span class="comment">&lt;!--advisor配置器：通知和切入点绑定--&gt;</span></span><br><span class="line">	<span class="tag">&lt;<span class="name">aop:advisor</span> <span class="attr">advice-ref</span>=<span class="string">&quot;txAdvice&quot;</span> <span class="attr">pointcut-ref</span>=<span class="string">&quot;customerServiceOperation&quot;</span>/&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">aop:config</span>&gt;</span></span><br></pre></td></tr></table></figure>
