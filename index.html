<h2 id="SpringMVC拦截器"><a href="#SpringMVC拦截器" class="headerlink" title="SpringMVC拦截器"></a>SpringMVC拦截器</h2><p>要HandleMapping映射成功才会进入拦截器</p>
<h4 id="拦截器和过滤器的区别"><a href="#拦截器和过滤器的区别" class="headerlink" title="拦截器和过滤器的区别"></a>拦截器和过滤器的区别</h4><ul>
<li><p>过滤器是用来拦截jsp、servlet请求的，拦截器用来拦截<strong>SpringMVC框架中Controller</strong></p>
</li>
<li><p>过滤器依赖Servlet容器中，不依赖servlet，因为SpringMVC Controller是在Spring容器中的</p>
</li>
<li><p>通过调用chain.doFilter方法执行后续内容，拦截器是通过return true/false 决定是否执行后续内容。</p>
</li>
<li><p>过滤器基于函数回调，过滤器基于动态代理，要继承HandleInterception</p>
</li>
<li><p>拦截器能获得参数，并修改参数（净网活动）</p>
<p><a target="_blank" rel="noopener" href="https://blog.csdn.net/fjnmbb12/article/details/74001567">拦截器参考</a></p>
<h4 id="拦截器三个方法"><a href="#拦截器三个方法" class="headerlink" title="拦截器三个方法"></a>拦截器三个方法</h4></li>
</ul>
<p>preHandle顺向，postHandle和afterCompletion逆向，主要是拦截Controller</p>
<p><strong>继承HandlerInterceptorAdapter或者实现HandlerInterceptor</strong>，<strong>推荐继承</strong>，这样可以选择想要的重写的方法</p>
   <figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">MyInterceptor</span> <span class="keyword">implements</span> <span class="title">HandlerInterceptor</span></span>&#123;</span><br><span class="line">  <span class="comment">/**</span></span><br><span class="line"><span class="comment">   * preHandle方法在Controller的handler方法前进行调用。</span></span><br><span class="line"><span class="comment">   * 如有多个Interceptor，SpringMVC会根据声明的前后顺序一个接一个的执行，</span></span><br><span class="line"><span class="comment">   * 主要用于身份认证（验证非法登陆）</span></span><br><span class="line"><span class="comment">   */</span></span><br><span class="line">  <span class="meta">@Override</span></span><br><span class="line">  <span class="function"><span class="keyword">public</span> <span class="keyword">boolean</span> <span class="title">preHandle</span><span class="params">(HttpServletRequest httpServletRequest, HttpServletResponse httpServletResponse, Object handler)</span> <span class="keyword">throws</span> Exception </span>&#123;</span><br><span class="line">    <span class="comment">//闸门</span></span><br><span class="line">    startTime = System.currentTimeMillis(); </span><br><span class="line">    <span class="keyword">return</span> <span class="keyword">true</span>;</span><br><span class="line">  &#125;</span><br><span class="line"></span><br><span class="line">  <span class="comment">/**</span></span><br><span class="line"><span class="comment">   * postHandle在Interceptor的preHandle方法返回值为true的时候才会执行 </span></span><br><span class="line"><span class="comment">   * 在Controller的方法调用之后，在DispatcherServlet进行视图的渲染之前执行</span></span><br><span class="line"><span class="comment">   * 在这个方法中可以对ModelAndView统一定制。比如菜单导航</span></span><br><span class="line"><span class="comment">   */</span></span><br><span class="line">  <span class="meta">@Override</span></span><br><span class="line">  <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">postHandle</span><span class="params">(HttpServletRequest httpServletRequest, HttpServletResponse</span></span></span><br><span class="line"><span class="function"><span class="params">                         httpServletResponse, Object o, ModelAndView modelAndView)</span> <span class="keyword">throws</span> Exception </span>&#123;</span><br><span class="line">    object o可以获得请求对象的参数，和设置</span><br><span class="line">      <span class="comment">//Controller 执行完毕后 要执行的代码 endTime = System.currentTimeMillis(); System.out.println(endTime-startTime);</span></span><br><span class="line">  &#125;</span><br><span class="line">  <span class="comment">/**</span></span><br><span class="line"><span class="comment">   * preHandle方法的返回值为true时才会执行。</span></span><br><span class="line"><span class="comment">   * 该方法将在整个请求完成之后，也就是DispatcherServlet渲染了视图后执行。</span></span><br><span class="line"><span class="comment">   * 该方法可用于清理一些资源：统一的异常处理，日志处理</span></span><br><span class="line"><span class="comment">   */</span></span><br><span class="line">  <span class="meta">@Override</span></span><br><span class="line">  <span class="keyword">public</span> <span class="keyword">void</span> afterCompletion&#123;&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>

<h1 id="SpringBoot配置"><a href="#SpringBoot配置" class="headerlink" title="SpringBoot配置"></a>SpringBoot配置</h1><p><a target="_blank" rel="noopener" href="https://blog.csdn.net/Thinkingcao/article/details/86613066">SpringBoot静态目录</a>、<a target="_blank" rel="noopener" href="https://blog.csdn.net/u011144425/article/details/79225864">静态目录</a>、<a target="_blank" rel="noopener" href="http://wuwenliang.net/2018/07/10/Springboot%E8%87%AA%E5%8A%A8%E9%85%8D%E7%BD%AE%E9%AD%94%E6%B3%95%E4%B9%8B%E8%87%AA%E5%AE%9A%E4%B9%89starter/">SpringBoot starter原理</a></p>
<p>SpringBoot用jar包启动（ nohup <strong>java -jar test.jar</strong> &amp; ：后台启动），传统web项目用war包封装（是webapp目录结构）。</p>
<p>常用启动器：web、test、thymeleaf、<a target="_blank" rel="noopener" href="https://blog.csdn.net/tszxlzc/article/details/89089111">mybatis+druit</a>、redis、log4j、dobbo、aop（很少用）</p>
<p>常用依赖：mysql-connector、kaptcha、shiro、swagger</p>
<h4 id="thymeleaf"><a href="#thymeleaf" class="headerlink" title="thymeleaf"></a><a target="_blank" rel="noopener" href="https://zhuanlan.zhihu.com/p/53848414">thymeleaf</a></h4><figure class="highlight properties"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># 配置JSP，不推荐</span></span><br><span class="line"><span class="meta">spring.view.prefix</span>=<span class="string">/WEB-INF/views/</span></span><br><span class="line"><span class="meta">spring.view.suffix</span>=<span class="string">.jsp</span></span><br><span class="line"><span class="comment"># 默认配置，可以选择不配置：</span></span><br><span class="line"><span class="meta">spring.thymeleaf.mode</span>=<span class="string">HTML5</span></span><br><span class="line"><span class="meta">spring.thymeleaf.encoding</span>=<span class="string">UTF-8</span></span><br><span class="line"><span class="meta">spring.thymeleaf.content-type</span>=<span class="string">text/html;charset=&lt;encoding&gt;</span></span><br><span class="line"><span class="meta">spring.thymeleaf.prefix</span>=<span class="string">classpath:/templates/</span></span><br><span class="line"><span class="meta">spring.thymeleaf.suffix</span>=<span class="string">.html</span></span><br><span class="line"><span class="comment"># 一般缓存设置为false, 这样修改之后马上生效，便于调试</span></span><br><span class="line"><span class="meta">spring.thymeleaf.cache</span>=<span class="string">false</span></span><br></pre></td></tr></table></figure>

<ul>
<li>变量名同样用用{}EL表达式，文件路径src用@{}</li>
</ul>
<figure class="highlight html"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">tr</span> <span class="attr">th:each</span>=<span class="string">&quot;s:$&#123;students&#125;&quot;</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">td</span> <span class="attr">th:text</span>=<span class="string">&quot;$&#123;s.id&#125;&quot;</span>&gt;</span>id<span class="tag">&lt;/<span class="name">td</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">td</span> <span class="attr">th:text</span>=<span class="string">&quot;$&#123;s.name&#125;&quot;</span>&gt;</span>name<span class="tag">&lt;/<span class="name">td</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">tr</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&lt;!-- 当students集合为空则显示提示信息,用了thymeleaf内置工具#list的isEmpty方法，</span></span><br><span class="line"><span class="comment">		 可以用$&#123;num == 6&#125;或者$&#123;!empty user&#125;直接EL逻辑运算--&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">div</span> <span class="attr">th:if</span>=<span class="string">&quot;$&#123;#lists.isEmpty(students)&#125;&quot;</span>&gt;</span>studnets集合为空！<span class="tag">&lt;/<span class="name">div</span>&gt;</span></span><br><span class="line"><span class="comment">&lt;!-- 当students集合不为空时才会显示下面的元素 --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">div</span> <span class="attr">th:if</span>=<span class="string">&quot;$&#123;not #lists.isEmpty(students)&#125;&quot;</span>&gt;</span></span><br><span class="line">  </span><br><span class="line"><span class="tag">&lt;<span class="name">tr</span> <span class="attr">th:class</span>=<span class="string">&quot;$&#123;status.even&#125;?&#x27;even&#x27;:&#x27;odd&#x27;&quot;</span>&gt;</span></span><br><span class="line">  </span><br><span class="line"><span class="tag">&lt;<span class="name">script</span> <span class="attr">src</span>=<span class="string">&quot;../../webapp/static/js/thymeleaf.js&quot;</span> <span class="attr">th:src</span>=<span class="string">&quot;@&#123;/static/js/thymeleaf.js&#125;&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">a</span> <span class="attr">href</span>=<span class="string">&quot;#&quot;</span>  <span class="attr">th:href</span>=<span class="string">&quot;@&#123;/static/js/thymeleaf.js&#125;&quot;</span> &gt;</span></span><br><span class="line"></span><br><span class="line"><span class="tag">&lt;<span class="name">script</span> <span class="attr">th:inline</span>=<span class="string">&quot;javascript&quot;</span>&gt;</span></span><br><span class="line"><span class="javascript">  <span class="keyword">var</span> stu = [[$&#123;student&#125;]];</span></span><br><span class="line"><span class="javascript">  <span class="built_in">console</span>.log(stu.name + <span class="string">&quot;/&quot;</span> + stu.id);</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">script</span>&gt;</span></span><br></pre></td></tr></table></figure>

<p>定义fragment组件： th:fragment=”footer1”、th:include=”include::footer1”、th:replace=”include::footer1”、layout:decorator、layout:fragment</p>
<h4 id="SpringBoot-MVC"><a href="#SpringBoot-MVC" class="headerlink" title="SpringBoot MVC"></a>SpringBoot MVC</h4><p>实现WebMvcConfigurer，作为配置类，不要继承WebMvcConfigurerAdapter，相当于@Configuration+@Enablespringmvc</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@Configuration</span></span><br><span class="line"><span class="keyword">public</span> <span class="class"><span class="keyword">class</span> <span class="title">WebConfigurer</span> <span class="keyword">implements</span> <span class="title">WebMvcConfigurer</span> </span>&#123;</span><br><span class="line">	<span class="meta">@Autowired</span></span><br><span class="line">  LoginIneerceptor loginInterceptor; </span><br><span class="line">  <span class="comment">//重写addInterceptor方法配置拦截器的地址，SpringBoot常用autowired+component注入Interceptor</span></span><br><span class="line">  <span class="meta">@Override</span></span><br><span class="line">	 <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">addInterceptors</span><span class="params">(InterceptorRegistry registry)</span> </span>&#123;</span><br><span class="line">        registry.addInterceptor(LoginInterceptor()).addPathPatterns(<span class="string">&quot;/**&quot;</span>);</span><br><span class="line">	 &#125;</span><br><span class="line">  <span class="comment">//重写addCorsMappings配置全局CORS；也可以注入一个CorsFilter的一个Bean来配置</span></span><br><span class="line">	 <span class="meta">@Override</span>  </span><br><span class="line">    <span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">addCorsMappings</span><span class="params">(CorsRegistry registry)</span> </span>&#123;  </span><br><span class="line">        registry.addMapping(<span class="string">&quot;/**&quot;</span>)  </span><br><span class="line">                .allowCredentials(<span class="keyword">true</span>)  </span><br><span class="line">                .allowedHeaders(<span class="string">&quot;*&quot;</span>)  </span><br><span class="line">                .allowedOrigins(<span class="string">&quot;*&quot;</span>)  </span><br><span class="line">                .allowedMethods(<span class="string">&quot;*&quot;</span>);  </span><br><span class="line">    &#125;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>



<h2 id="开启Spring容器"><a href="#开启Spring容器" class="headerlink" title="开启Spring容器"></a>开启Spring容器</h2><h4 id="1-编写Spring的配置文件"><a href="#1-编写Spring的配置文件" class="headerlink" title="1. 编写Spring的配置文件"></a>1. 编写Spring的配置文件</h4><p>Spring配置文件（习惯命名applicationContext.xml）的作用在于配置注解扫描（也可以用类上声明@Configuration+@Bean注册），和注册Bean，</p>
<h4 id="3-加载配置资源，创建BeanFactory"><a href="#3-加载配置资源，创建BeanFactory" class="headerlink" title="3. 加载配置资源，创建BeanFactory"></a>3. 加载配置资源，创建BeanFactory</h4><figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">//1.Application接受Spring容器，是BeanFactory的子类，创建时就初始化所有Bean，类路径/绝对路径</span></span><br><span class="line">ApplicationContext context = <span class="keyword">new</span> ClassPathXmlApplicationContext(<span class="string">&quot;applicationContext.xml&quot;</span>);</span><br><span class="line">														<span class="keyword">new</span> FileSystemXmlApplicationContext(<span class="string">&quot;c:/applicatioContext.xml&quot;</span>);</span><br><span class="line">UserService UserService = (Userservice)context.getBean(<span class="string">&quot;userServiceImpl&quot;</span>);</span><br><span class="line"><span class="comment">//2. XmlBeanFactory+ClasspathResource获取（过时），getBean时才初始化</span></span><br><span class="line">BeanFactory factory = <span class="keyword">new</span> XmlBeanFactory(<span class="keyword">new</span> ClassPathResource(<span class="string">&quot;applicationContext.xml&quot;</span>););</span><br><span class="line"><span class="comment">//读取注解配置类：</span></span><br><span class="line">ctx = <span class="keyword">new</span> AnnotationConfigApplicationContext(ApplicationContextConfig.class);</span><br></pre></td></tr></table></figure>

<h2 id="注册Bean"><a href="#注册Bean" class="headerlink" title="注册Bean"></a>注册Bean</h2><ul>
<li><p><strong>@Component、@Controller、@Service、@Repository</strong>，注册Bean，将Bean的ID=小写的类名。</p>
<p>Repository注解很少使用，因为经常用MapperScanner给我们扫描了dao层，注册到了容器中</p>
</li>
<li><p>注册Bean：<strong>id和class属性（类的位置，不是接口位置）</strong>是必须属性，尤其是class。</p>
<p>xml注册Bean、注解注册Bean、类注册（@configuration注解放在配置类上，@Bean注解放在返会类对象的方法上）</p>
</li>
</ul>
<h2 id="Spring注入"><a href="#Spring注入" class="headerlink" title="Spring注入"></a>Spring注入</h2><p>spring的注入是指在启动spring容器加载Bean配置的时候，<strong>完成对对变量的赋值行为</strong>。常见的spring注入的方式有两种，分别是设值注入和构造注入。</p>
<h4 id="1-值注入"><a href="#1-值注入" class="headerlink" title="1. 值注入"></a>1. 值注入</h4><ol>
<li><strong>@Value：</strong>可以从配置文件读取时，如@Value(“${driver.name}”)</li>
<li>xml配置的设值注入依赖于setter，在注册Bean里设置property，视图解析器等等Bean已经配过很多次了</li>
</ol>
<h4 id="2-依赖注入"><a href="#2-依赖注入" class="headerlink" title="2. 依赖注入"></a>2. 依赖注入</h4><ol>
<li><p>@Autowired <strong>：默认</strong>按类型自动装配依赖，如果在容器中装配的类型有多个bean，自动再按名字自动装配。</p>
<p> @Resource ：为空时，先按name，后按照type匹配。@Resource(type=Ivehicle.class，name=”car”)。</p>
<p><strong>@Qualifier</strong>组合使用，通过Qualifier主动指定Bean的名字。</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">// 写在这个属性的setter方法上（需要有）</span></span><br><span class="line"><span class="meta">@Autowired</span></span><br><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">setCar</span><span class="params">(IVehicle car)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">this</span>.car = car;</span><br><span class="line">&#125;</span><br><span class="line"><span class="comment">// 写在构造器参数前面，当我们调用这个构造方法创建Bean时</span></span><br><span class="line"><span class="function"><span class="keyword">public</span> <span class="title">Driver</span><span class="params">(String name, <span class="meta">@Autowired</span> IVehicle vehicle)</span> </span>&#123;</span><br><span class="line">  <span class="keyword">this</span>.name = name;</span><br><span class="line">  <span class="keyword">this</span>.car = vehicle;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
</li>
<li><p>Bean设置里的设置property的ref就是依赖注入整个对象，需要setter。也可以通过xml构造器依赖注入。</p>
</li>
</ol>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;eDao&quot;</span> <span class="attr">ref</span>=<span class="string">&quot;empdao&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">property</span>&gt;</span></span><br><span class="line"><span class="comment">&lt;!-- 或者  --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;edao&quot;</span> &gt;</span></span><br><span class="line">		<span class="tag">&lt;<span class="name">ref</span> <span class="attr">bean</span>=<span class="string">&quot;empdao&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">ref</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">property</span>&gt;</span></span><br></pre></td></tr></table></figure>

<ol start="3">
<li><strong>xml自动依赖注入</strong>，在bean标签中，设置<strong>autowire</strong>=”byName”或者autowire= “byType”（还有constructor和default，一般不用）<br>例如：bean中有一个属性是IPerson类型，如果配置了按类型装配，就会到容器中找类型是IPerson的bean,注入到属性中，但是IPerson有多个实现类时，会报错。</li>
</ol>
<p>类型自动装配缺点：容器中只能有一个该类型的bean（Ivehicle属性只能有一个继承类） ，多个继承类，会出现下面的异常：</p>
<h4 id="3-更改默认无参构造器"><a href="#3-更改默认无参构造器" class="headerlink" title="3. 更改默认无参构造器"></a>3. 更改默认无参构造器</h4><p>从Spring默认通过反射调用<strong>无参构造器获取对象</strong>。可以使用自定义的构造器注入一部分值和属性（比较少用），在Bean注册中用constructor-arg指定多个<strong>构造器参数</strong>，index指定参数的位置，type制定参数类型。</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">bean</span> <span class="attr">id</span>=<span class="string">&quot;driver&quot;</span> <span class="attr">class</span>=<span class="string">&quot;com.oracle.Driver&quot;</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">constructor-arg</span> <span class="attr">index</span>=<span class="string">&quot;0&quot;</span> <span class="attr">type</span>=<span class="string">&quot;java.lang.String&quot;</span> <span class="attr">value</span>=<span class="string">&quot;老张&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">constructor-arg</span>&gt;</span></span><br><span class="line">	<span class="tag">&lt;<span class="name">constructor-arg</span> <span class="attr">index</span>=<span class="string">&quot;1&quot;</span> <span class="attr">type</span>=<span class="string">&quot;int&quot;</span> <span class="attr">value</span>=<span class="string">&quot;20&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">constructor-arg</span>&gt;</span></span><br><span class="line">  <span class="comment">&lt;!--构造器依赖注入 --&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">constructor-arg</span> <span class="attr">index</span>=<span class="string">&quot;3&quot;</span> <span class="attr">ref</span>=<span class="string">&quot;car&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">constructor-arg</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">bean</span>&gt;</span></span><br></pre></td></tr></table></figure>

<h2 id="scope"><a href="#scope" class="headerlink" title="scope"></a>scope</h2><p>Spring容器中的Bean默认都是单例的（取多次都是同一个对象），bean的scope属性设为<strong>prototype</strong>，Bean变成多例，</p>
<p>request：request表示该针对每一次HTTP请求都会产生一个新的bean，同时该bean仅在当前HTTP request内有效</p>
<p>session：session表示该针对每一次HTTP请求都会产生一个新的bean，同时该bean仅在当前HTTP session</p>
<p>globalsession：global session作用域类似于标准的HTTP Session作用域，仅仅在基于portlet的web应用中才有意义</p>
<ul>
<li><p>@Scope ：xml里bean元素的scope属性，设定Bean的作用范围，也可以放在方法上。默认单例，Spring容器加载时就创建对象，prototype每一次获取Bean就创建</p>
</li>
<li><p>xml设置</p>
</li>
</ul>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">bean</span> <span class="attr">id</span>=<span class="string">&quot;driver&quot;</span> <span class="attr">class</span>=<span class="string">&quot;com.oracle.Driver&quot;</span> <span class="attr">scope</span>=<span class="string">&quot;prototype&quot;</span>&gt;</span></span><br></pre></td></tr></table></figure>

<h2 id="生命周期方法"><a href="#生命周期方法" class="headerlink" title="生命周期方法"></a>生命周期方法</h2><p>在bean创建，或销毁时设置一个方法（很少用）</p>
<ul>
<li><strong>@PostConstruct和@PreDestroy</strong>  ：Bean生命周期方法的注解（等于bean属性配置init-method=”init”）</li>
<li>xml设置生命周期方法：在bean中设置属性一个<strong>init-menthod</strong>等于对象中的哪个方法</li>
</ul>
<h1 id="spring-xml配置"><a href="#spring-xml配置" class="headerlink" title="spring xml配置"></a>spring xml配置</h1><h2 id="扫描注解"><a href="#扫描注解" class="headerlink" title="扫描注解"></a>扫描注解</h2><p>xml需要加上context的xml命名空间和context的schema验证文件，Springboot不需要配置Spring注解的扫描</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">context:component-scan</span> <span class="attr">base-package</span>=<span class="string">&quot;com.oracle&quot;</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">context:exclude-filter</span> <span class="attr">type</span>=<span class="string">&quot;regex&quot;</span> <span class="attr">expression</span>=<span class="string">&quot;com.oracle.intelagr.controller&quot;</span>/&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">context:component-scan</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&lt;!-- 可以用调整包括范围 --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">context:including-filter</span>/&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&lt;!-- 不推荐使用，这个只配置了普通的context:componetscan代替--&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">context:annotation-config</span>/&gt;</span></span><br></pre></td></tr></table></figure>

<h2 id="读取properties文件"><a href="#读取properties文件" class="headerlink" title="读取properties文件"></a>读取properties文件</h2><p>通过类似于EL表达式的${ }，在XML或者Spring注解中，引入properties文件里面的值。另外习惯性通过资源文件（加载Locale读取不同配置文件）国际化</p>
<p>添加Spring配置文件：</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">context:property-placeholder</span> <span class="attr">location</span>=<span class="string">&quot;classpath：applicationContext.properties&quot;</span>/&gt;</span></span><br><span class="line"><span class="comment">&lt;!--多个时，可以选择这种方式--&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">bean</span> <span class="attr">id</span>=<span class="string">&quot;propertyConfigurer&quot;</span> <span class="attr">class</span>=<span class="string">&quot;org.springframework.beans.factory.config.PropertyPlaceholderConfigurer&quot;</span>&gt;</span></span><br><span class="line">        <span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;location&quot;</span>&gt;</span></span><br><span class="line">          <span class="tag">&lt;<span class="name">value</span>&gt;</span>application.properties<span class="tag">&lt;/<span class="name">value</span>&gt;</span></span><br><span class="line">          <span class="tag">&lt;<span class="name">value</span>&gt;</span>jdbc.properties<span class="tag">&lt;/<span class="name">value</span>&gt;</span></span><br><span class="line">        <span class="tag">&lt;/<span class="name">property</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">bean</span>&gt;</span></span><br></pre></td></tr></table></figure>

<h2 id="Spring整合Mybatis"><a href="#Spring整合Mybatis" class="headerlink" title="Spring整合Mybatis"></a>Spring整合Mybatis</h2><p>Spring无缝整合SpringMVC，主要需要整合mybatis到Spring中。</p>
<p>mybatis-Spring包，SpringDate里的：sqlSessionTemplate()模板类。</p>
<h4 id="数据源-连接池"><a href="#数据源-连接池" class="headerlink" title="数据源/连接池"></a>数据源/连接池</h4><p> 数据源是数据库的抽象映射，一个数据源对应一个数据库，连接池是数据库的代理，每一次增删改，都要连接一次，非常耗时间，很多容器都给我们提供了<strong>连接池代替数据源</strong></p>
   <figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">&lt;!-- 这里使用DriverManager使用JDBC数据源 --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">bean</span> <span class="attr">id</span>=<span class="string">&quot;dataSource&quot;</span> <span class="attr">class</span>=<span class="string">&quot;org.springframework.jdbc.datasource.DriverManagerDataSource&quot;</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;driverClassName&quot;</span> <span class="attr">value</span>=<span class="string">&quot;com.mysql.jdbc.Driver&quot;</span> /&gt;</span> </span><br><span class="line">  <span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;url&quot;</span> <span class="attr">value</span>=<span class="string">&quot;jdbc:mysql://localhost:3306/cmp?useUnicode=true<span class="symbol">&amp;amp;</span>characterEncoding=utf8&quot;</span> /&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;username&quot;</span> <span class="attr">value</span>=<span class="string">&quot;root&quot;</span> /&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;password&quot;</span> <span class="attr">value</span>=<span class="string">&quot;root&quot;</span> /&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">bean</span>&gt;</span></span><br></pre></td></tr></table></figure>

<h4 id="sqlSessionFactory"><a href="#sqlSessionFactory" class="headerlink" title="sqlSessionFactory"></a>sqlSessionFactory</h4><p>将mybatsi的<strong>SqlSession工厂注册到Spring容器中</strong>，<strong>注入数据源到Mybatis</strong>，设值注入要扫描实体包的包位置。这个是必须配置</p>
   <figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">&lt;!-- sqlSessionFactory注册在Spring容器中，同时注入数据源Bean--&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">bean</span> <span class="attr">id</span>=<span class="string">&quot;sqlSessionFactory&quot;</span> <span class="attr">class</span>=<span class="string">&quot;org.mybatis.spring.SqlSessionFactoryBean&quot;</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;dataSource&quot;</span> <span class="attr">ref</span>=<span class="string">&quot;dataSource&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">property</span>&gt;</span></span><br><span class="line">  <span class="comment">&lt;!-- 扫描实体类所在的包，将实体类别名包 --&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;typeAliasesPackage&quot;</span> <span class="attr">value</span>=<span class="string">&quot;com.oracle.ssm.entity&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">property</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">bean</span>&gt;</span></span><br></pre></td></tr></table></figure>

<h4 id="Mapper扫描器"><a href="#Mapper扫描器" class="headerlink" title="Mapper扫描器"></a>Mapper扫描器</h4><p>注册Mapper扫描器，配置扫描Mapper接口的包位置（<strong>Mapper接口和Mapper.xml名字的包要一致</strong>），自动创建Mapper接口的代理对象（以前通过getMapper方法）。Mapper的代理对象(dao层)已经在Spring容器中，只需要我们用注解注入。</p>
   <figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">bean</span> <span class="attr">id</span>=<span class="string">&quot;mapperScanner&quot;</span> <span class="attr">class</span>=<span class="string">&quot;org.mybatis.spring.mapper.MapperScannerConfigurer&quot;</span>&gt;</span></span><br><span class="line">  <span class="comment">&lt;!-- 过时：&lt;property name=&quot;sqlSessionFactory&quot; ref=&quot;sqlSessionFactory&quot;&gt; --&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;sqlSessionFactoryBeanName&quot;</span> <span class="attr">value</span>=<span class="string">&quot;sqlSessionFactory&quot;</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;basePackage&quot;</span> <span class="attr">value</span>=<span class="string">&quot;com.oracle.cmp.mapper&quot;</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">bean</span>&gt;</span></span><br></pre></td></tr></table></figure>

<p>除了使用mapper扫描器，自动完成接口绑定和mapper代理类的生成。</p>
<p>也可以使用sqlsessiontemplate完成、</p>
<h4 id="数据库事务管理器"><a href="#数据库事务管理器" class="headerlink" title="数据库事务管理器"></a>数据库事务管理器</h4><p> 需要的业务方法或者业务类由@Transcation调度</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="tag">&lt;<span class="name">bean</span> <span class="attr">id</span>=<span class="string">&quot;txManager&quot;</span> <span class="attr">class</span>=<span class="string">&quot;org.springframework.jdbc.datasource.DataSourceTransactionManager&quot;</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">*</span>&quot;<span class="attr">dataSource</span>&quot; <span class="attr">ref</span>=<span class="string">&quot;dataSource&quot;</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">bean</span>&gt;</span></span><br><span class="line"><span class="comment">&lt;!-- 由Annotation调度事务管理Bean --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">tx:annotation-driven</span> <span class="attr">transaction-manager</span>=<span class="string">*</span>&quot;<span class="attr">txManager</span>&quot; /&gt;</span></span><br></pre></td></tr></table></figure>

<h1 id="SpringMVC配置"><a href="#SpringMVC配置" class="headerlink" title="SpringMVC配置"></a>SpringMVC配置</h1><p>SprintMVC基本原理：浏览器发送请求，交给**核心控制器(DispatcherServlet)**，查找HandlderMapping中是否有对应的地址映射，如果存在要访问映射的控制器，先经过HandlerAdapter做类型自动转换、处理请求参数，访问Controller，Controller将模型数据和视图地址封装为ModelAndView对象交换给核心控制器，通过视图解析器为视图的地址添加前缀和后缀，向指定的视图层跳转。</p>
<h2 id="SpringMVC注解"><a href="#SpringMVC注解" class="headerlink" title="SpringMVC注解"></a>SpringMVC注解</h2><p>   <a target="_blank" rel="noopener" href="https://blog.csdn.net/qian_ch/article/details/73826663">参考</a></p>
<ol>
<li><p><strong>Controller</strong></p>
</li>
<li><p><strong>RequestParam</strong>：修饰参数，如果传入参数和想要名字不一样</p>
<ul>
<li><p>value：请求参数名字和参数名不一致，指定属性 </p>
</li>
<li><p><strong>defaultValue</strong>：当请求参数的值为空时，指定默认值</p>
</li>
<li><p>required：指定参数是必要的参数，写了这个参数时，<strong>默认true，否则返回400</strong></p>
</li>
</ul>
</li>
<li><p><strong>RequestMapping</strong>：地址映射，如果超过一个属性，就要写value=”地址”</p>
<ul>
<li><p>value=”/user/*/createUser”、</p>
<p>​            /user/**/createUser、/user/createUser??、**/user/{userId}**、</p>
<p>​            {userID}和PathValuable一同使用</p>
</li>
<li><p>method={RequestMethod.POST, RequestMethod.GET}</p>
</li>
<li><p>consumes=”application/json”。<strong>指定浏览器来的content-type</strong></p>
</li>
<li><p>params=”name”，必须要有name属性</p>
</li>
</ul>
<p>限制方法可用**@GetMapping、@PostMapping、DeleteMapping、PutMapping、PatchMapping**</p>
</li>
<li><p>RestController：相当于@Controller+@ResponseBody注解</p>
</li>
<li><p><strong>PathVariable</strong>：修饰参数，将url中的模板变量绑定到PathVariable注解的参数上（用于传入参数）</p>
<p>URI：@RequestMapping(value=”/pathVariableTest/{userId})</p>
<p>方法： public void Test(@PathVariable Integer userId) 或 public void Test(@PathVariable(“userId”) Interge userId)</p>
</li>
<li><p><a target="_blank" rel="noopener" href="https://blog.csdn.net/leo3070/article/details/81046383">ModleAttribute</a></p>
</li>
<li><p>SessionAttributes(value = {“user1”} )：绑定session，方便在方法中用</p>
</li>
<li><p>CookieValue、ResponseStatus修饰异常类设定状态码，主动返回这个状态码给用户，出现异常返回500页面</p>
</li>
<li><p>@ExceptionHandler+@ControllerAdvice</p>
</li>
</ol>
<h4 id="SpringMVC-Ajax请求"><a href="#SpringMVC-Ajax请求" class="headerlink" title="SpringMVC Ajax请求"></a>SpringMVC Ajax请求</h4><p>   传统：拼接JSON，用字节流返回JSON。ajax收到返回的JSON将JSON自动转成js对象</p>
<p>   <a target="_blank" rel="noopener" href="https://blog.csdn.net/walkerJong/article/details/7520896">注解参考</a></p>
<ul>
<li><p><strong>@ResponseBody</strong></p>
<p>放在方法头上，将方法返回值解析成JSON，<strong>依赖Jackson-databind</strong>，在common类中定义具体Result，规范返回JSON格式</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">服务器									浏览器</span><br><span class="line">Map/对象						返回JSON，复杂数据可以写到Map里，帮我们转化成JSON</span><br><span class="line">List&lt;User&gt;格式				返回JS数组：[&#123;<span class="string">&quot;name&quot;</span>:<span class="string">&quot;lee&quot;</span>&#125;]</span><br><span class="line">字符串								收的dataType要设置为text。</span><br></pre></td></tr></table></figure>

</li>
</ul>
<h2 id="接收请求参数（URL编码）"><a href="#接收请求参数（URL编码）" class="headerlink" title="接收请求参数（URL编码）"></a>接收请求参数（URL编码）</h2><p>SprintMVC请求参数一定要在前端进行格式化，类型不匹配时则无法自动设值注入，返回400错误。</p>
<p>handle方法写什么就自动传入什么，如写HttpServeltRequest</p>
<h4 id="1-参数名映射"><a href="#1-参数名映射" class="headerlink" title="1. 参数名映射"></a>1. 参数名映射</h4><p>handle的方法和参数名字自动匹配，自动完成值注入</p>
<ol>
<li>情况一： 请求参数的名字 和方法参数的名字一致 ，直接就注入到方法参数中<ul>
<li>不写RequestParam时，引用类型没有传入参数时，不会报错，默认值为null；基本数据类型必须要传入参数</li>
<li>写RequestParam时，默认required时true。所有类型必须要参数，即User/list?name=?pwd=，参数可以为空。</li>
</ul>
</li>
</ol>
<p>例如，访问的URL为：<a target="_blank" rel="noopener" href="http://localhost:8080/controller/hello?name=tom&amp;age=20">http://localhost:8080/controller/hello?name=tom&amp;age=20</a></p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@RequestMapping(&quot;/hello&quot;)</span></span><br><span class="line"><span class="function"><span class="keyword">public</span> String <span class="title">hello</span><span class="params">(String name,<span class="keyword">int</span> age)</span></span>&#123;</span><br><span class="line">    System.out.println(<span class="string">&quot;hello World:&quot;</span>+name+<span class="string">&quot;,age:&quot;</span>+(age+<span class="number">1</span>));</span><br><span class="line">    <span class="keyword">return</span> <span class="keyword">null</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<ol start="2">
<li>情况二：请求参数的名字和方法参数的名字不致 ，通过**@RequestParam**（写在参数前面）指定名字映射</li>
</ol>
<p>例如，访问的URL为：<a target="_blank" rel="noopener" href="http://localhost:8080/controller/hello?name=tom&amp;a=20">http://localhost:8080/controller/hello?name=tom&amp;a=20</a></p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@RequestMapping(&quot;/hello&quot;)</span></span><br><span class="line"><span class="function"><span class="keyword">public</span> String <span class="title">hello</span><span class="params">(String name,<span class="meta">@RequestParam(&quot;a&quot;)</span> <span class="keyword">int</span> age)</span></span>&#123;</span><br><span class="line">    System.out.println(<span class="string">&quot;hello World:&quot;</span>+name+<span class="string">&quot;,age:&quot;</span>+(age+<span class="number">1</span>));</span><br><span class="line">    <span class="keyword">return</span> <span class="keyword">null</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

<h4 id="2-对象名映射"><a href="#2-对象名映射" class="headerlink" title="2. 对象名映射"></a>2. 对象名映射</h4><ol start="3">
<li>将请求参数注入到一个对象中，<strong>请求参数的名字和对象的属性名相同</strong>即可完成值的注入，不需要完整的对象属性</li>
</ol>
<p>例如 url：<a target="_blank" rel="noopener" href="http://localhost:8080/controller/hello?empno=110&amp;ename=tom&amp;tel=1234567">http://localhost:8080/controller/hello?empno=110&amp;ename=tom&amp;tel=1234567</a></p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@RequestMapping(&quot;/hello&quot;)</span></span><br><span class="line">  <span class="function"><span class="keyword">public</span> String <span class="title">hello</span><span class="params">(Emp e)</span></span>&#123;</span><br><span class="line">			e.getEmpno();</span><br><span class="line">      <span class="keyword">return</span> <span class="keyword">null</span>;</span><br><span class="line">  &#125;</span><br></pre></td></tr></table></figure>

<ol start="4">
<li>请求参数包含多个对象匹配</li>
</ol>
<p>参数重写多个对象，下面是一个对象带依赖</p>
<p>表单中包含员工数据和部门的数据 ，想把所有保存在Emp中，前端的依赖对象的name写<strong>依赖对象.属性，</strong>自动完成设值</p>
<figure class="highlight jsp"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br></pre></td><td class="code"><pre><span class="line">&lt;body&gt;</span><br><span class="line">    &lt;form action=<span class="string">&quot;/controller/hello&quot;</span> method=<span class="string">&quot;post&quot;</span>&gt;</span><br><span class="line">        &lt;input type=<span class="string">&quot;text&quot;</span> name=<span class="string">&quot;empno&quot;</span>&gt;&lt;br&gt;</span><br><span class="line">        &lt;input type=<span class="string">&quot;text&quot;</span> name=<span class="string">&quot;ename&quot;</span>&gt;&lt;br&gt;</span><br><span class="line">        &lt;input type=<span class="string">&quot;text&quot;</span> name=<span class="string">&quot;tel&quot;</span>&gt;&lt;br&gt;</span><br><span class="line">        部门id：&lt;input type=<span class="string">&quot;text&quot;</span> name=<span class="string">&quot;d.deptno&quot;</span>&gt; &lt;br&gt;</span><br><span class="line">        &lt;input type=<span class="string">&quot;submit&quot;</span> value=<span class="string">&quot;保存&quot;</span>&gt;</span><br><span class="line">    &lt;/form&gt;</span><br><span class="line">&lt;/body&gt;</span><br><span class="line">    <span class="meta">@RequestMapping(&quot;/hello&quot;)</span></span><br><span class="line">    <span class="function"><span class="keyword">public</span> String <span class="title">hello</span><span class="params">(Emp e)</span></span>&#123;</span><br><span class="line">			自动我们设置e对象中的d.deptno</span><br><span class="line">    &#125;</span><br></pre></td></tr></table></figure>

<h4 id="3-Map貌似不能接受数据"><a href="#3-Map貌似不能接受数据" class="headerlink" title="3. Map貌似不能接受数据"></a>3. Map貌似不能接受数据</h4><h2 id="接受JSON数据"><a href="#接受JSON数据" class="headerlink" title="接受JSON数据"></a>接受JSON数据</h2><p>需要映射的前面加**@RequestBody**注解，可以有四种修饰，一般用下面的前两种</p>
<p> 将请求体中的JSON/xml字符串绑定到相应的bean上或绑定到对应的字符串上（会根据Content-Type，JSON、XML）），<strong>只能修饰最后一个参数</strong></p>
<p>如add（提交操作）时一般使用Ajax（好让前端提示添加失败，不会重置窗口），这是一般使用PO类来接受（尤其是单表）</p>
<p>list（页面动态信息）页面时，一般直接对应</p>
   <figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"> 浏览器														服务器 </span><br><span class="line">JSON：&#123;属性名:属性值&#125;									对象/Map</span><br><span class="line">[&#123;属性名:属性值&#125;,&#123;属性名:属性值&#125;]    		List&lt;User&gt;</span><br><span class="line">数组：[<span class="string">&quot;123&quot;</span>,<span class="string">&quot;456&quot;</span>] 									List&lt;String&gt;</span><br><span class="line">String															String</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">login</span><span class="params">(<span class="meta">@requestBody</span> String userName, <span class="meta">@requestBody</span> String pwd)</span></span></span><br><span class="line"><span class="function">JSON：</span>&#123;<span class="string">&quot;userName&quot;</span>:<span class="string">&quot;lee&quot;</span>, <span class="string">&quot;pwd&quot;</span>:<span class="string">&quot;123&quot;</span>&#125;</span><br></pre></td></tr></table></figure>

<h2 id="向view传数据"><a href="#向view传数据" class="headerlink" title="向view传数据"></a>向view传数据</h2><ol>
<li><p>直接使用request对象（不推荐），下面这些方法设值的原理是核心控制器（dispatcherServlet）给我们request.setAttribute。</p>
</li>
<li><p>在Controller的方法参数中<strong>定义Map参数</strong>（最常用），不用request.setAttribute主要是为了做到和servlet-API的松耦合，可以脱离servile进行单元测试。</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@RequestMapping(&quot;/test1&quot;)</span></span><br><span class="line"><span class="function"><span class="keyword">public</span> String <span class="title">test1</span><span class="params">(String name, Map map)</span></span>&#123;</span><br><span class="line">  map.put(<span class="string">&quot;name&quot;</span>,<span class="string">&quot;toms&quot;</span>);</span><br><span class="line">  map.put(<span class="string">&quot;age&quot;</span>,<span class="number">20</span>);</span><br><span class="line">  map.put(<span class="string">&quot;emp&quot;</span>,<span class="keyword">new</span> Emp());</span><br><span class="line">  <span class="keyword">return</span> <span class="string">&quot;succ&quot;</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
</li>
<li><p>在Controller的方法参数中<strong>定义Model/ModelMap参数</strong></p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@RequestMapping(&quot;/test1&quot;)</span></span><br><span class="line"><span class="function"><span class="keyword">public</span> String <span class="title">test1</span><span class="params">(String name, Model model)</span></span>&#123;</span><br><span class="line">  model.addAttribute(<span class="string">&quot;name&quot;</span>,<span class="string">&quot;toms&quot;</span>);</span><br><span class="line">  model.addAttribute(<span class="string">&quot;age&quot;</span>,<span class="number">20</span>);</span><br><span class="line">  model.addAttribute(<span class="string">&quot;emp&quot;</span>,<span class="keyword">new</span> Emp());</span><br><span class="line">  <span class="keyword">return</span> <span class="string">&quot;succ&quot;</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">// 会在进入访问该控制器的所有方法前，设定model的值</span></span><br><span class="line"><span class="meta">@ModelAttribute</span></span><br><span class="line"><span class="function"><span class="keyword">public</span> <span class="keyword">void</span> <span class="title">model</span><span class="params">(Model model)</span> </span>&#123;</span><br><span class="line">    model.addAttribute(<span class="string">&quot;message&quot;</span>, <span class="string">&quot;注解成功&quot;</span>);</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
</li>
<li><p>封装到ModelAndView对象中，ModleAndView对象可以放在参数当中生成</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@RequestMapping(&quot;/test2&quot;)</span></span><br><span class="line"><span class="function"><span class="keyword">public</span> ModelAndView <span class="title">test2</span><span class="params">(String name)</span></span>&#123;</span><br><span class="line">  ModelAndView modelAndView = <span class="keyword">new</span> ModelAndView(<span class="string">&quot;/fail&quot;</span>);</span><br><span class="line">  modelAndView.addObject(<span class="string">&quot;name&quot;</span>,<span class="string">&quot;toms&quot;</span>);</span><br><span class="line">  modelAndView.addObject(<span class="string">&quot;age&quot;</span>,<span class="number">20</span>);</span><br><span class="line">  modelAndView.addObject(<span class="string">&quot;emp&quot;</span>,<span class="keyword">new</span> Emp());</span><br><span class="line">  <span class="keyword">return</span> modelAndView;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>

</li>
</ol>
<h2 id="向view跳转"><a href="#向view跳转" class="headerlink" title="向view跳转"></a>向view跳转</h2><p>Controller的状态和handler返回值有关，默认跳转。ServletController不做操作时返回空白到字符串。</p>
<ul>
<li>**return ResponseEntity&lt;byte[]&gt;**：用于文件下载</li>
<li>带ResponseBody注解，向浏览器发送JSON数据：</li>
</ul>
<h4 id="return跳转"><a href="#return跳转" class="headerlink" title="return跳转"></a>return跳转</h4><p>两种方式，无论是哪种 ，核心控制器获得的都是ModelAndView</p>
<ol>
<li><p>直接return 字符串：跳转的地址</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@RequestMapping(&quot;/test1&quot;)</span></span><br><span class="line"><span class="function"><span class="keyword">public</span> String <span class="title">test1</span><span class="params">()</span></span>&#123;</span><br><span class="line">  <span class="keyword">return</span> <span class="string">&quot;/succ.jsp&quot;</span>;</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
</li>
<li><p>直接return ModelAndView对象 ，跳转的地址封装到这个对象中</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@RequestMapping(&quot;/test2&quot;)</span></span><br><span class="line"><span class="function"><span class="keyword">public</span> ModelAndView <span class="title">test2</span><span class="params">()</span></span>&#123;</span><br><span class="line">  <span class="keyword">return</span> <span class="keyword">new</span> ModelAndView(<span class="string">&quot;/fail.jsp&quot;</span>);</span><br><span class="line">&#125;</span><br></pre></td></tr></table></figure>
</li>
<li><p><strong>return void时，必须resp向浏览器返回数据或用request跳转</strong>，否则返回404/500</p>
<p>⚠️：默认forward，如果在地址字符串中包含 forward: 或 redirect:  就不经过视图解析器</p>
<ul>
<li>请求转发跳转  jsp  :  不写forward</li>
<li>重定向jsp ：  “redirect: uri”</li>
<li>请求转发跳转  Controller :  地址的字符串中  “forward: controller的uri”</li>
<li>重定向  Controller :   “redirect: uri”</li>
</ul>
</li>
</ol>
<h2 id="SpringMVC配置文件"><a href="#SpringMVC配置文件" class="headerlink" title="SpringMVC配置文件"></a>SpringMVC配置文件</h2><p>可以使用<a target="_blank" rel="noopener" href="https://juejin.im/post/5dcd0c8851882510a3712f72">类配置SpringMVC</a>，做到类似于SpringBoot（不推荐）</p>
<ol>
<li><p>web.xml配置</p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">&lt;!-- 配置监听器，项目一加载，就加载Spring容器，并加载Spring配置文件--&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">listener</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">listener-class</span>&gt;</span>org.springframework.web.context.ContextLoaderListener<span class="tag">&lt;/<span class="name">listener-class</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">listener</span>&gt;</span></span><br><span class="line"><span class="comment">&lt;!-- content-param在启动时会存在servletContext对象(application)中 --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">context-param</span>&gt;</span></span><br><span class="line">	<span class="tag">&lt;<span class="name">param-name</span>&gt;</span>contextConfigLocation<span class="tag">&lt;/<span class="name">param-name</span>&gt;</span></span><br><span class="line">	<span class="tag">&lt;<span class="name">param-value</span>&gt;</span>classpath:applicationContext.xml<span class="tag">&lt;/<span class="name">param-value</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">context-param</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&lt;!--配置springmvc 核心控制器DispatcherServlet，并指定dispatcherServlet配置文件的路径--&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">servlet</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">servlet-name</span>&gt;</span>springmvc<span class="tag">&lt;/<span class="name">servlet-name</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">servlet-class</span>&gt;</span>org.springframework.web.servlet.DispatcherServlet<span class="tag">&lt;/<span class="name">servlet-class</span>&gt;</span></span><br><span class="line">	<span class="tag">&lt;<span class="name">load-on-startup</span>&gt;</span>1<span class="tag">&lt;/<span class="name">load-on-startup</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">init-param</span>&gt;</span></span><br><span class="line">    <span class="comment">&lt;!--配置springmvc配置文件的位置，如果配置文件名改了名，必须要配置--&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">param-name</span>&gt;</span>contextConfigLocation<span class="tag">&lt;/<span class="name">param-name</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">param-value</span>&gt;</span>classpath:springmvc-servlet.xml<span class="tag">&lt;/<span class="name">param-value</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;/<span class="name">init-param</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">servlet</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&lt;!-- 拦截所有带斜杠的请求，以前是配置/*.do、/*.xhtml，防静态资源，但是非Rest风格 --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">servlet-mapping</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">servlet-name</span>&gt;</span>springmvc<span class="tag">&lt;/<span class="name">servlet-name</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">url-pattern</span>&gt;</span>/<span class="tag">&lt;/<span class="name">url-pattern</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">servlet-mapping</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&lt;!-- 用Springweb给我们提供的字符过滤器 --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">filter</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">filter-name</span>&gt;</span>encodingFilter<span class="tag">&lt;/<span class="name">filter-name</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">filter-class</span>&gt;</span>org.springframework.web.filter.CharacterEncodingFilter<span class="tag">&lt;/<span class="name">filter-class</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">init-param</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">param-name</span>&gt;</span>encoding<span class="tag">&lt;/<span class="name">param-name</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">param-value</span>&gt;</span>UTF-8<span class="tag">&lt;/<span class="name">param-value</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;/<span class="name">init-param</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">init-param</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">param-name</span>&gt;</span>forceEncoding<span class="tag">&lt;/<span class="name">param-name</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">param-value</span>&gt;</span>true<span class="tag">&lt;/<span class="name">param-value</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;/<span class="name">init-param</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">filter</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">filter-mapping</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">filter-name</span>&gt;</span>encodingFilter<span class="tag">&lt;/<span class="name">filter-name</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">url-pattern</span>&gt;</span>/*<span class="tag">&lt;/<span class="name">url-pattern</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">filter-mapping</span>&gt;</span></span><br></pre></td></tr></table></figure>
</li>
<li><p>配置MVC的dispatcherServlet，servletname名字随便起，默认是servlet名-servlet.xml</p>
<p><a target="_blank" rel="noopener" href="https://blog.csdn.net/qq_30038111/article/details/79722624">关于SpringMVC静态资源的处理</a></p>
<figure class="highlight xml"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment">&lt;!--拓充MVC的注解 请求参数的注解和装载数据注解等等 --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">mvc:annotation-driven</span>/&gt;</span></span><br><span class="line"><span class="comment">&lt;!-- MVC需要单独扫描Controller  --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">context:component-scan</span> <span class="attr">base-package</span>=<span class="string">&quot;com.oracle.controller&quot;</span>/&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&lt;!-- SimpleUrlHandlerMapping，Controller的Bean配置，一般用注解扫描代替 --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">bean</span> <span class="attr">id</span>=<span class="string">&quot;helloController&quot;</span> <span class="attr">class</span>=<span class="string">&quot;controller.HelloController&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">bean</span>&gt;</span> </span><br><span class="line"><span class="tag">&lt;<span class="name">bean</span> <span class="attr">id</span>=<span class="string">&quot;simpleUrlHandlerMapping&quot;</span></span></span><br><span class="line"><span class="tag">      <span class="attr">class</span>=<span class="string">&quot;org.springframework.web.servlet.handler.SimpleUrlHandlerMapping&quot;</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;mappings&quot;</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">props</span>&gt;</span></span><br><span class="line">      <span class="comment">&lt;!-- /hello 路径的请求交给 id 为 helloController 的控制器处理--&gt;</span></span><br><span class="line">      <span class="tag">&lt;<span class="name">prop</span> <span class="attr">key</span>=<span class="string">&quot;/hello&quot;</span>&gt;</span>helloController<span class="tag">&lt;/<span class="name">prop</span>&gt;</span></span><br><span class="line">    <span class="tag">&lt;/<span class="name">props</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;/<span class="name">property</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">bean</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&lt;!--  指定项目的静态资源注册到SimpleUrlHandlerMapping，</span></span><br><span class="line"><span class="comment">   **表示路径映射两级文件夹，打破了传统文件夹只能放在web根目录下的限制，</span></span><br><span class="line"><span class="comment">   mapping代表映射后的路径，并且可以设置cacheControl</span></span><br><span class="line"><span class="comment">   默认配置静态资源：，&lt;mvc:default-servlet-handler /&gt; </span></span><br><span class="line"><span class="comment">   表示没有mapping，就去默认路径找，但是不能指定任意位置   --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">mvc:resources</span> <span class="attr">mapping</span>=<span class="string">&quot;/js/**&quot;</span> <span class="attr">location</span>=<span class="string">&quot;/js/&quot;</span> <span class="attr">cache-period</span>=<span class="string">&quot;31556926&quot;</span>/&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">mvc:resources</span> <span class="attr">mapping</span>=<span class="string">&quot;/style/**&quot;</span> <span class="attr">location</span>=<span class="string">&quot;/style/&quot;</span> /&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">mvc:resources</span> <span class="attr">mapping</span>=<span class="string">&quot;/upload/**&quot;</span> <span class="attr">location</span>=<span class="string">&quot;/upload/&quot;</span> /&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&lt;!-- 拦截器，SpringMVC提供的类似Filter的工具，用来拦截handler，可以不写--&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">mvc:interceptors</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">mvc:interceptor</span> &gt;</span></span><br><span class="line">    <span class="comment">&lt;!-- 拦截哪个Controller，优先级高 --&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">mvc:mapping</span> <span class="attr">path</span>=<span class="string">&quot;/testController&quot;</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">bean</span> <span class="attr">class</span>=<span class="string">&quot;com.oracle.common.MyInterceptor&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">bean</span>&gt;</span> </span><br><span class="line">  <span class="tag">&lt;/<span class="name">mvc:interceptor</span>&gt;</span></span><br><span class="line">  </span><br><span class="line">  <span class="tag">&lt;<span class="name">mvc:interceptor</span> &gt;</span>                            </span><br><span class="line">    <span class="tag">&lt;<span class="name">mvc:mapping</span> <span class="attr">path</span>=<span class="string">&quot;/test*&quot;</span>/&gt;</span></span><br><span class="line">    <span class="tag">&lt;<span class="name">bean</span> <span class="attr">class</span>=<span class="string">&quot;com.oracle.common.MyInterceptor2&quot;</span>&gt;</span><span class="tag">&lt;/<span class="name">bean</span>&gt;</span> </span><br><span class="line">  <span class="tag">&lt;/<span class="name">mvc:interceptor</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">mvc:interceptors</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&lt;!-- 配置viewResolver视图解析器，thymeleaf需要配置view.ThymeleafViewResolver这个解析 --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">bean</span> <span class="attr">id</span>=<span class="string">&quot;viewResolver&quot;</span> <span class="attr">class</span>=<span class="string">&quot;org.springframework.web.servlet.view.InternalResourceViewResolver&quot;</span>&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;prefix&quot;</span> <span class="attr">value</span>=<span class="string">&quot;/pages/&quot;</span> /&gt;</span></span><br><span class="line">  <span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;suffix&quot;</span> <span class="attr">value</span>=<span class="string">&quot;.jsp&quot;</span> /&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">bean</span>&gt;</span></span><br><span class="line"></span><br><span class="line"><span class="comment">&lt;!-- 文件上传解析器 multipart --&gt;</span></span><br><span class="line"><span class="tag">&lt;<span class="name">bean</span> <span class="attr">id</span>=<span class="string">&quot;multipartResolver&quot;</span> <span class="attr">class</span>=<span class="string">&quot;org.springframework.web.multipart.commons.CommonsMultipartResolver&quot;</span>/&gt;</span></span><br><span class="line">	<span class="comment">&lt;!-- 上传文件大小上限，单位为字节（10MB）,可选 --&gt;</span></span><br><span class="line">	<span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;maxUploadSize&quot;</span>&gt;</span>  </span><br><span class="line">  	<span class="tag">&lt;<span class="name">value</span>&gt;</span>10485760<span class="tag">&lt;/<span class="name">value</span>&gt;</span>  </span><br><span class="line">	<span class="tag">&lt;/<span class="name">property</span>&gt;</span>  </span><br><span class="line">	<span class="comment">&lt;!-- 请求的编码格式，必须和jSP的pageEncoding属性一致，以便正确读取表单的内容，可选 --&gt;</span></span><br><span class="line">	<span class="tag">&lt;<span class="name">property</span> <span class="attr">name</span>=<span class="string">&quot;defaultEncoding&quot;</span>&gt;</span></span><br><span class="line">  	<span class="tag">&lt;<span class="name">value</span>&gt;</span>UTF-8<span class="tag">&lt;/<span class="name">value</span>&gt;</span></span><br><span class="line">	<span class="tag">&lt;/<span class="name">property</span>&gt;</span></span><br><span class="line"><span class="tag">&lt;/<span class="name">bean</span>&gt;</span></span><br></pre></td></tr></table></figure>
</li>
</ol>

          <h4 id="定位符"><a href="#定位符" class="headerlink" title="定位符"></a>定位符</h4><p>^a    以a开始</p>
<p>a$    以a结束</p>
<h4 id="字符代表符号（匹配符）"><a href="#字符代表符号（匹配符）" class="headerlink" title="字符代表符号（匹配符）"></a>字符代表符号（匹配符）</h4><p>[a-z]    小写字母、[a-zA-Z0-9]    字母和数字</p>
<p>.     除换行符以外的任意单字符</p>
<p>\d    数字。</p>
<p>\D    非数字</p>
<p>\w    数字，字母或下划线</p>
<p>\s    特殊字符</p>
<h4 id="数量限定符"><a href="#数量限定符" class="headerlink" title="数量限定符"></a>数量限定符</h4><p>{5}： 前面的一个字符出现5次        {1,}：1次以上。        {1,3}：1次到3次</p>
<p>*    前面的一个字符出现0次以上</p>
<p>+    前面的一个字符出现1次以上</p>
<p>？    前面的一个字符出现0次或1次</p>
<h3 id="前瞻和后顾"><a href="#前瞻和后顾" class="headerlink" title="前瞻和后顾"></a>前瞻和后顾</h3><p>正则表达的前后，还未解析字符的称为前面，解析过的称为后面</p>
<p>a(?=b)            前瞻，匹配a，且a必须在b的前面</p>
<p>a(?!b)            负前瞻，匹配a，且a的前面不是b</p>
<p>(?&lt;=b)a        后顾，匹配a，且a的后面b</p>
<p>(?&lt;!b)a        负后顾，匹配a，且a的后面不是b</p>
<p>|                    分成两段，或者</p>
<p>()    圈定一个子串</p>
<h2 id="JS使用正则表达式"><a href="#JS使用正则表达式" class="headerlink" title="JS使用正则表达式"></a>JS使用正则表达式</h2><p><strong>var regexp = /正则表达式/修饰符</strong>，</p>
<p>修饰符有i（不区分大小写）和g（全局匹配）</p>
<p><strong>匹配：regexp.test(str)</strong></p>
<h2 id="Java使用正则表达式"><a href="#Java使用正则表达式" class="headerlink" title="Java使用正则表达式"></a>Java使用正则表达式</h2><p>Pattern.complile(“”)创建正则对象</p>
<ul>
<li><p>匹配验证</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">Pattern p = Pattern.compile(<span class="string">&quot;^[0-9a-zA-Z]\\.&#123;5,10&#125;@[0-9a-zA-z]&#123;2,7&#125;(\\.com|.cn)&quot;</span>)</span><br><span class="line">Matcher m = p.matcher(str)</span><br><span class="line">m.matches()</span><br></pre></td></tr></table></figure>
</li>
<li><p>以一个正则表达式拆分:</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">String str = <span class="string">&quot;A1B22C333D4444E55555F&quot;</span>;</span><br><span class="line">Pattern p = Pattern.compile(“\\d”);</span><br><span class="line">String[ ] s = p.split(str);</span><br><span class="line"><span class="keyword">for</span> (<span class="keyword">int</span> i = <span class="number">0</span>; i &lt; s.length; i++) &#123;</span><br><span class="line">  System.out.print(s[i]+<span class="string">&quot;\t&quot;</span>);</span><br><span class="line">&#125;	</span><br><span class="line">  结果为ABCDEF</span><br></pre></td></tr></table></figure>
</li>
<li><p>替换里面的字符:</p>
<figure class="highlight java"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">String str = <span class="string">&quot;A1B22C333D4444E55555F&quot;</span>;</span><br><span class="line">Pattern p = Pattern.compile(“\\d”);</span><br><span class="line"></span><br><span class="line">Matcher m = p.matcher(str);</span><br><span class="line">String newStr = m.replaceAll(<span class="string">&quot;-&quot;</span>);</span><br><span class="line">System.out.println(newStr);</span><br></pre></td></tr></table></figure>

</li>
</ul>
